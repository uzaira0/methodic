# Bearer configuration — auto-loaded by `bearer scan .` and bearer/bearer-action
# (see .github/workflows/analysis.yml :: bearer job, scanner: sast).
#
# Why this skip-path:
# Bearer is a sensitive-data-flow (PII/PHI) SAST tool aimed at Chronicle's own
# Kotlin/TypeScript code. A `bearer scan .` of the whole tree also descends into
# docker/traefik/plugins-local/.../crowdsec-bouncer-traefik-plugin/ — a VENDORED,
# upstream, SHA-pinned third-party Go plugin (the CrowdSec Traefik bouncer) that
# Chronicle does not author or maintain. Every finding Bearer produced (2 critical,
# 9 high, 1 medium) was located in that vendored plugin and its own vendored deps,
# and was a generic gosec Go rule (command/subproc, file-permission, SSRF,
# InsecureSkipVerify, permissive regex) — NONE were PII/PHI data-flow findings, and
# NONE were in Chronicle source. Bearer detected ZERO PII/PHI data subjects in the
# project's own code.
#
# Skipping the vendored plugin scopes Bearer to first-party code (its intended
# target) and makes the SAST data-flow job GREEN. Upstream Go-plugin hardening is
# out of scope for this repo (the plugin is pinned upstream; if its findings matter
# they belong to the CrowdSec project, not Chronicle).
scan:
  skip-path:
    - "docker/traefik/plugins-local"

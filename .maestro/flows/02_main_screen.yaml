# Flow: Verify main screen after enrollment
# After enrollment and tapping Done, the app should show MainActivity
# displaying the study ID, participant ID, and last upload timestamp.

appId: com.openlattice.chronicle
tags:
  - smoke
  - post-enrollment
---
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 10000

# Verify main screen elements are visible
# Study ID header and value
- assertVisible:
    id: "com.openlattice.chronicle:id/studyIdHeader"

- assertVisible:
    id: "com.openlattice.chronicle:id/studyId"

# Participant ID header and value
- assertVisible:
    id: "com.openlattice.chronicle:id/participantIdHeader"

- assertVisible:
    id: "com.openlattice.chronicle:id/participantId"

# Last upload header
- assertVisible:
    id: "com.openlattice.chronicle:id/lastUploadHeader"

# The upload progress view may or may not be visible depending on timing
# Just verify the main screen loaded without crashing

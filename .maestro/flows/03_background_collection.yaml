# Flow: Verify background data collection
# After enrollment, generate some usage events by switching apps,
# then return to Chronicle and verify it's still running.

appId: com.openlattice.chronicle
tags:
  - upload
---
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 10000

# Verify app is on main screen (enrolled)
- assertVisible:
    id: "com.openlattice.chronicle:id/studyId"

# Generate usage events by opening browser
- openLink: "https://www.example.com"
- waitForAnimationToEnd
- wait: 3000
- pressKey: home
- wait: 2000

# Open settings briefly
- launchApp:
    appId: com.android.settings
- wait: 2000
- pressKey: home
- wait: 2000

# Return to Chronicle — should still be active, not crashed
- launchApp:
    clearState: false

- waitForAnimationToEnd:
    timeout: 10000

# Main screen should still show study/participant info
- assertVisible:
    id: "com.openlattice.chronicle:id/studyId"

- assertVisible:
    id: "com.openlattice.chronicle:id/participantId"

# Wait a bit for the upload worker to potentially run
- wait: 10000

# Check that lastUploadValue has some content (may still be empty if upload hasn't fired)
- assertVisible:
    id: "com.openlattice.chronicle:id/lastUploadValue"

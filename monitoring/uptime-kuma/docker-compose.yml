# Uptime Kuma — self-hosted external monitoring service for Chronicle.
# Deploy alongside the Traefik stack on the production host.
#
# Persistent storage: ./data/ holds monitor configurations + uptime history.
# Use `monitors.json` (sibling file) as the source-of-truth import; the Kuma
# admin UI exports/imports from this format.

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: chronicle-uptime-kuma
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    ports:
      - '127.0.0.1:3001:3001'
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/status-page/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.uptime-kuma.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.uptime-kuma.entrypoints=${TRAEFIK_ENTRYPOINT:-web}'
      - 'traefik.http.services.uptime-kuma.loadbalancer.server.port=3001'

networks:
  default:
    name: ${TRAEFIK_NETWORK:-traefik-apps}
    external: true

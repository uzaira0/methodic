name: Setup Web Environment
description: Checkout repo, install Bun + Node, and run bun install for the web frontend

inputs:
  working-directory:
    description: Directory containing the web frontend
    required: false
    default: chronicle-web
  fetch-depth:
    description: Number of commits to fetch (0 for full history)
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        submodules: true
        # Don't leave the token in .git/config after checkout (artipacked):
        # submodule fetch happens during checkout, so dropping it after is safe.
        persist-credentials: false

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: latest

    - name: Setup Node compatibility runtime
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: lts/*

    - name: Install web deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile

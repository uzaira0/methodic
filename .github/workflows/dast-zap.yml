name: dast-zap

# OWASP ZAP baseline DAST scan against a stack-up backend. Nightly + dispatch.
# Complements Schemathesis (which is contract-fuzzing); ZAP catches OWASP-Top-10
# class issues (XSS, injection, broken auth, mistrusted CORS, etc.).

on:
  schedule:
    - cron: '0 4 * * *'   # daily 04:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL (default: locally booted backend)'
        required: false
        default: 'http://localhost:8080'

permissions:
  contents: read
  security-events: write

jobs:
  zap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build chronicle-server
        run: ./gradlew :chronicle-server:bootJar -x test

      - name: Boot Docker stack (postgres + backend)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # Reuse the api-contract.yml docker-up script if it exists; otherwise inline boot
          docker compose --env-file docker/.env.example -f docker/docker-compose.traefik.yml up -d postgres backend
          # Wait for backend healthz
          for i in {1..60}; do
            if curl -sf http://localhost:8080/chronicle/v3/healthz >/dev/null 2>&1; then
              echo "Backend healthy"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 5
          done

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target || 'http://localhost:8080' }}
          fail_action: false   # Report findings, don't fail build
          allow_issue_writing: false
          rules_file_name: '.zap/rules.tsv'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 30

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.traefik.yml down -v --remove-orphans

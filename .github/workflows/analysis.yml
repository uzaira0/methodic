name: Comprehensive Analysis

# Catches bugs, quality issues, performance problems, correctness errors,
# type drift, dead code, complexity — everything beyond security scanning.
# Security-focused scanning lives in security-scan.yml and security-suite.yml.

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

# Least privilege: SARIF upload (security-events: write) and PR comments
# (pull-requests: write) are granted only on the jobs that need them, below.
permissions:
  contents: read

jobs:
  # ============================================================================
  # Detekt — Kotlin static analysis (complexity, style, bugs, performance)
  # ============================================================================
  detekt:
    name: Detekt (Kotlin analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload-sarif
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Setup JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Detekt
        # The detekt/detekt-action repo was deleted from GitHub (404), which both broke
        # this step and made zizmor's impostor-commit audit fatal. Run the detekt CLI
        # directly instead — pinned release jar, sha256-verified before execution (same
        # supply-chain control the deleted action provided, minus the dead dependency).
        # Identical args + version to the former action; matches the local detekt run.
        run: |
          set -euo pipefail
          DETEKT_VERSION=1.23.7
          DETEKT_JAR="detekt-cli-${DETEKT_VERSION}-all.jar"
          DETEKT_SHA256=84beded283012cb2b38bcaef4996452fcd6069d2e9ca74b50eaa79e0ad21897e
          curl -fsSL --retry 3 -o "$DETEKT_JAR" \
            "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/${DETEKT_JAR}"
          echo "${DETEKT_SHA256}  ${DETEKT_JAR}" | sha256sum -c -
          java -jar "$DETEKT_JAR" \
            --input chronicle-server/src,chronicle-api/src,rhizome/src \
            --config detekt.yml \
            --report sarif:detekt-results.sarif \
            --report html:detekt-results.html \
            --build-upon-default-config

      - name: Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: detekt-results.sarif
          category: detekt

      - name: Upload Detekt HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: detekt-report
          path: detekt-results.html
          retention-days: 14

  # ============================================================================
  # PMD — Java/Kotlin bug and performance pattern detection
  # ============================================================================
  pmd:
    name: PMD (bug patterns)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write     # pmd-github-action createGitHubAnnotations
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Run PMD
        uses: pmd/pmd-github-action@d9c1f3c5940cbf5923f1354e83fa858b4496ebaa # v2
        with:
          version: '7.9.0'
          sourcePath: 'chronicle-server/src/main/kotlin,chronicle-api/src/main/kotlin'
          rulesets: 'rulesets/java/quickstart.xml'
          analyzeModifiedFilesOnly: false
          createGitHubAnnotations: true

  # ============================================================================
  # Bearer — sensitive data flow analysis (HIPAA-critical)
  # Finds PII/PHI leaking through logs, API responses, error messages
  # ============================================================================
  bearer:
    name: Bearer (data flow SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload-sarif
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Run Bearer
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc # v2
        with:
          scanner: sast
          format: sarif
          output: bearer-results.sarif

      - name: Upload Bearer SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: bearer-results.sarif
          category: bearer

  # ============================================================================
  # OSV-Scanner — Google's vulnerability database (broader than NVD alone)
  # ============================================================================
  osv-scanner:
    name: OSV-Scanner (Google vuln DB)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload-sarif
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            .

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  # ============================================================================
  # Grype — Anchore's vulnerability scanner (uses Anchore DB for broad CVE coverage)
  # ============================================================================
  grype:
    name: Grype (Anchore vuln scan)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload-sarif
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Run Grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          path: .
          fail-build: true
          output-format: sarif
        id: grype-scan

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype

  # ============================================================================
  # Syft SBOM — generates Software Bill of Materials for supply chain visibility
  # ============================================================================
  sbom:
    name: Syft SBOM generation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx
          path: sbom-spdx.json
          retention-days: 90

  # ============================================================================
  # OpenAPI diff — catches breaking API changes on PRs
  # ============================================================================
  api-diff:
    name: OpenAPI breaking change detection
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Checkout base branch spec
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.base_ref }}
          path: base
          submodules: true

      - name: Setup JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Generate current OpenAPI spec
        run: ./gradlew :chronicle-api:generateOpenApiSpec --no-daemon

      - name: Generate base OpenAPI spec
        working-directory: base
        run: ./gradlew :chronicle-api:generateOpenApiSpec --no-daemon

      - name: Install oasdiff
        run: |
          # Pinned release + checksum-verified (was: curl install.sh | sh — pipe-to-shell
          # from a mutable 'main' script with no verification).
          OASDIFF_VERSION=1.20.0
          OASDIFF_SHA256=16f9a277edf8605cdb5595f8a7a4fbb474130c803a26099a1ff7e474b01c8580
          curl -fsSL "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/oasdiff.tar.gz
          echo "${OASDIFF_SHA256}  /tmp/oasdiff.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/oasdiff.tar.gz -C /usr/local/bin oasdiff

      - name: Check for breaking changes
        run: |
          BASE_SPEC=$(find base -name "openapi*.json" -o -name "openapi*.yaml" 2>/dev/null | head -1)
          HEAD_SPEC=$(find . -not -path "./base/*" \( -name "openapi*.json" -o -name "openapi*.yaml" \) 2>/dev/null | head -1)
          if [ -n "$BASE_SPEC" ] && [ -n "$HEAD_SPEC" ]; then
            echo "Comparing $BASE_SPEC vs $HEAD_SPEC"
            oasdiff breaking "$BASE_SPEC" "$HEAD_SPEC" --format text
            echo "## API Changelog" >> "$GITHUB_STEP_SUMMARY"
            oasdiff changelog "$BASE_SPEC" "$HEAD_SPEC" --format text >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Could not find OpenAPI specs to compare"
            exit 1
          fi

  # ============================================================================
  # Dependency Review — GitHub-native license + vuln check for new deps in PRs
  # ============================================================================
  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write     # comment-summary-in-pr
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ============================================================================
  # OpenSSF Scorecard — supply chain security posture score
  # ============================================================================
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

  # ============================================================================
  # Summary gate
  # ============================================================================
  analysis-summary:
    name: Analysis Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detekt, pmd, bearer, osv-scanner, grype, sbom]
    if: always()
    steps:
      - name: Generate summary
        env:
          DETEKT: ${{ needs.detekt.result }}
          PMD: ${{ needs.pmd.result }}
          BEARER: ${{ needs.bearer.result }}
          OSV: ${{ needs.osv-scanner.result }}
          GRYPE: ${{ needs.grype.result }}
          SBOM: ${{ needs.sbom.result }}
        run: |
          echo "## Comprehensive Analysis Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Analyzer | Type | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detekt | Kotlin SAST | $DETEKT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PMD | Bug patterns | $PMD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bearer | Data flow | $BEARER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| OSV-Scanner | Google vuln DB | $OSV |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Grype | Anchore vuln DB | $GRYPE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Syft | SBOM generation | $SBOM |" >> "$GITHUB_STEP_SUMMARY"

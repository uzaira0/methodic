name: zizmor (GitHub Actions SAST)

# Static analysis of our OWN workflows + composite actions. zizmor is purpose-built
# for CI/CD supply-chain footguns — dangerous pull_request_target usage, template
# injection, credential persistence (artipacked), unpinned/​stale action refs,
# excessive token permissions. This keeps the hardening in this repo from
# regressing: a PR that reintroduces one of those patterns gets flagged inline.
#
# ENFORCING: the medium+ backlog has been triaged to zero, so this gate now FAILS on
# any new medium+ finding. Deliberately-accepted findings (e.g. the auto-merge
# pull_request_target) are recorded with rationale in .github/zizmor.yml.

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        # Fails the job on any new medium+ finding; emits inline PR annotations.
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # zizmor runs as a digest-pinned Docker image baked into the action release.
          version: "1.26.1"
          inputs: .
          min-severity: medium
          config: .github/zizmor.yml
          # Inline PR annotations (mutually exclusive with advanced-security SARIF upload).
          advanced-security: false
          annotations: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

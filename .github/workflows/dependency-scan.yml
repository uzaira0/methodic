name: Dependency Security Scan

on:
  schedule:
    # Weekly Monday 6am UTC
    - cron: '0 6 * * 1'
  push:
    paths:
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/package.json'
      - '**/bun.lockb'
      - 'gradle/libs.versions.toml'
  pull_request:
    paths:
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/package.json'
      - '**/bun.lockb'
      - 'gradle/libs.versions.toml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          exit-code: '1'
        continue-on-error: true
        id: trivy

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-dependency-scan

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-dependency-scan
          path: trivy-fs.sarif
          retention-days: 30

      - name: Fail on HIGH/CRITICAL vulnerabilities
        if: steps.trivy.conclusion == 'failure'
        run: |
          echo "::error::Trivy found HIGH or CRITICAL vulnerabilities in project dependencies."
          echo "Review the GitHub Security tab or download the trivy-dependency-scan artifact for details."
          exit 1

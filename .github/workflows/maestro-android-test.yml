name: Maestro Android UI Tests

# Runs the Chronicle Android app against the server on multiple API levels.
# Triggers on PRs and manual dispatch.
on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      android_ref:
        description: "Git ref for chronicle-android repo (branch/tag/sha)"
        required: false
        default: "develop"
        type: string

env:
  APP_PACKAGE: com.openlattice.chronicle
  AUTH_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2xvY2FsaG9zdC8iLCJhdWQiOiJkdW1teS1jbGllbnQtaWQiLCJzdWIiOiJsb2NhbC1hZG1pbiIsImlhdCI6MTc3MDQyOTkxNSwiZXhwIjo0OTI0MDI5OTE1fQ.5d9ecGq0oAaoTujkV9i1SpZAMHpSl6IJMjJSWvvoBoo"

jobs:
  # ------------------------------------------------------------------
  # 1. Build the Android APK with server URL patched to localhost
  # ------------------------------------------------------------------
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Android app
        uses: actions/checkout@v4
        with:
          repository: uzaira0/chronicle
          ref: ${{ inputs.android_ref || 'develop' }}
          path: chronicle-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Patch server URL for local testing
        working-directory: chronicle-android
        run: |
          # Replace the production URL with the emulator host loopback.
          # 10.0.2.2 is how the Android emulator reaches the host machine.
          sed -i 's|https://api.getmethodic.com|http://10.0.2.2/chronicle/api/mobile|g' \
            app/src/main/java/com/openlattice/chronicle/services/upload/UploadWorker.kt

          # Also patch Enrollment.kt if it uses PRODUCTION
          sed -i 's|https://api.getmethodic.com|http://10.0.2.2/chronicle/api/mobile|g' \
            app/src/main/java/com/openlattice/chronicle/Enrollment.kt || true

          # Allow cleartext HTTP traffic to 10.0.2.2 (emulator loopback)
          # Add usesCleartextTraffic if not already present
          if ! grep -q 'usesCleartextTraffic' app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<application android:usesCleartextTraffic="true"|' \
              app/src/main/AndroidManifest.xml
          fi

          echo "Patched server URL to http://10.0.2.2/chronicle/api/mobile"

      - name: Remove signing config requirement
        working-directory: chronicle-android
        run: |
          # Remove signingConfigs block and release signing reference so debug build works
          # without signing.properties
          sed -i '/signingConfigs/,/}/d' app/build.gradle || true
          sed -i '/signingConfig /d' app/build.gradle || true

      - name: Remove google-services.json requirement
        working-directory: chronicle-android
        run: |
          # Create a dummy google-services.json if missing
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json <<'GSVC'
          {
            "project_info": {"project_number": "000000000000", "project_id": "dummy", "storage_bucket": "dummy.appspot.com"},
            "client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": {"package_name": "com.openlattice.chronicle"}}, "api_key": [{"current_key": "dummy"}]}],
            "configuration_version": "1"
          }
          GSVC
          fi

      - name: Build debug APK
        working-directory: chronicle-android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-debug-apk
          path: chronicle-android/app/build/outputs/apk/debug/*.apk
          retention-days: 1

  # ------------------------------------------------------------------
  # 2. Run Maestro flows on each API level in parallel
  # ------------------------------------------------------------------
  maestro-test:
    needs: build-apk
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 33, 34]
    name: "Maestro (API ${{ matrix.api-level }})"

    steps:
      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: chronicle-debug-apk
          path: apk/

      - name: Find APK path
        run: |
          APK_PATH=$(find apk/ -name '*.apk' | head -1)
          echo "APK_PATH=${APK_PATH}" >> "${GITHUB_ENV}"
          echo "Found APK: ${APK_PATH}"

      # -- Start the Chronicle server stack --
      - name: Start Chronicle server
        run: |
          cat > docker/.env <<'DOTENV'
          DOMAIN=localhost
          TRAEFIK_ENTRYPOINT=web
          TRAEFIK_NETWORK=traefik
          POSTGRES_PASSWORD=testpassword123
          DOTENV

          docker compose -f docker/docker-compose.traefik.yml up -d --build 2>&1 || true

          echo "Waiting for Chronicle backend..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:40320/chronicle/healthcheck > /dev/null 2>&1; then
              echo "Backend ready after ~$((i*2))s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "ERROR: Backend did not start within 4 minutes"
              docker compose -f docker/docker-compose.traefik.yml logs backend | tail -50
              exit 1
            fi
            sleep 2
          done

      # -- Seed test data --
      - name: Seed test study and participant
        run: |
          export SERVER_URL=http://localhost
          source .maestro/setup-test-data.sh

      # -- Install Maestro --
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      # -- Start emulator and run Maestro --
      - name: Run Maestro tests on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Install the APK
            adb install "${APK_PATH}"

            # Run all Maestro flows in order
            maestro test \
              --env TEST_STUDY_ID="${TEST_STUDY_ID}" \
              --env TEST_PARTICIPANT_ID="${TEST_PARTICIPANT_ID}" \
              --format junit \
              --output maestro-results.xml \
              .maestro/flows/

      # -- Results --
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results-api${{ matrix.api-level }}
          path: |
            maestro-results.xml
            ~/.maestro/tests/**/*
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Maestro API ${{ matrix.api-level }}"
          path: maestro-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Capture failure evidence
        if: failure()
        run: |
          mkdir -p failure-screenshots
          adb exec-out screencap -p > "failure-screenshots/screen-api${{ matrix.api-level }}.png" || true
          adb logcat -d > "failure-screenshots/logcat-api${{ matrix.api-level }}.txt" || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-api${{ matrix.api-level }}
          path: failure-screenshots/
          retention-days: 14

  # ------------------------------------------------------------------
  # 3. Gate — all API levels must pass
  # ------------------------------------------------------------------
  test-gate:
    needs: maestro-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all API levels passed
        env:
          RESULT: ${{ needs.maestro-test.result }}
        run: |
          if [ "${RESULT}" != "success" ]; then
            echo "Maestro tests failed on one or more API levels"
            exit 1
          fi
          echo "All Maestro tests passed across API levels 30, 33, 34"

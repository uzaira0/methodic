name: Maestro Android UI Tests

# Runs the Chronicle Android app against the server on multiple API levels.
# Triggers on PRs and manual dispatch.
on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      android_ref:
        description: "Git ref for chronicle-android repo (branch/tag/sha)"
        required: false
        default: "develop"
        type: string

env:
  APP_PACKAGE: com.openlattice.chronicle
  AUTH_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2xvY2FsaG9zdC8iLCJhdWQiOiJkdW1teS1jbGllbnQtaWQiLCJzdWIiOiJsb2NhbC1hZG1pbiIsImlhdCI6MTc3MDQyOTkxNSwiZXhwIjo0OTI0MDI5OTE1fQ.5d9ecGq0oAaoTujkV9i1SpZAMHpSl6IJMjJSWvvoBoo"

jobs:
  # ------------------------------------------------------------------
  # 1. Build the Android APK with server URL patched to localhost
  # ------------------------------------------------------------------
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Android app
        uses: actions/checkout@v4
        with:
          repository: uzaira0/chronicle
          ref: ${{ inputs.android_ref || 'develop' }}
          path: chronicle-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Patch server URL for local testing
        working-directory: chronicle-android
        run: |
          # Replace the production URL with the emulator host loopback.
          # 10.0.2.2 is how the Android emulator reaches the host machine.
          # The backend runs directly on port 40320 in CI (no Traefik).
          sed -i 's|https://api.getmethodic.com|http://10.0.2.2:40320|g' \
            app/src/main/java/com/openlattice/chronicle/services/upload/UploadWorker.kt

          sed -i 's|https://api.getmethodic.com|http://10.0.2.2:40320|g' \
            app/src/main/java/com/openlattice/chronicle/Enrollment.kt || true

          # Allow cleartext HTTP traffic
          if ! grep -q 'usesCleartextTraffic' app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<application android:usesCleartextTraffic="true"|' \
              app/src/main/AndroidManifest.xml
          fi

          echo "Patched server URL to http://10.0.2.2:40320"

      - name: Patch signing config for CI
        working-directory: chronicle-android
        run: |
          cat > app/signing.properties <<'PROPS'
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=/home/runner/.android/debug.keystore
          storePassword=android
          PROPS
          sed -i '/signingConfig signingConfigs/d' app/build.gradle

      - name: Create dummy google-services.json
        working-directory: chronicle-android
        run: |
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json <<'GSVC'
          {
            "project_info": {"project_number": "000000000000", "project_id": "dummy", "storage_bucket": "dummy.appspot.com"},
            "client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": {"package_name": "com.openlattice.chronicle"}}, "api_key": [{"current_key": "dummy"}]}],
            "configuration_version": "1"
          }
          GSVC
          fi

      - name: Build debug APK
        working-directory: chronicle-android
        run: ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-debug-apk
          path: chronicle-android/app/build/outputs/apk/debug/*.apk
          retention-days: 1

  # ------------------------------------------------------------------
  # 2. Build the Chronicle backend JAR
  # ------------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Create git tag for publish.gradle
        run: |
          git tag v0.0.0 2>/dev/null || true

      - name: Build backend
        run: ./gradlew :chronicle-server:installDist --no-daemon -PdevelopmentMode=true -x test -x spotbugsMain -x spotbugsTest

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-backend
          path: chronicle-server/build/install/chronicle-server/
          retention-days: 1

  # ------------------------------------------------------------------
  # 3. Run Maestro flows on each API level in parallel
  # ------------------------------------------------------------------
  maestro-test:
    needs: [build-apk, build-backend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 33, 34]
    name: "Maestro (API ${{ matrix.api-level }})"

    # Postgres service container — no SSL, no Docker-in-Docker needed
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chronicle
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U chronicle -d chronicle"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout (for Maestro flows and configs)
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: chronicle-debug-apk
          path: apk/

      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: chronicle-backend
          path: chronicle-backend/

      - name: Find APK path
        run: |
          APK_PATH=$(find apk/ -name '*.apk' | head -1)
          echo "APK_PATH=${APK_PATH}" >> "${GITHUB_ENV}"
          echo "Found APK: ${APK_PATH}"

      # -- Start Chronicle backend directly (no Docker) --
      - name: Start Chronicle backend
        run: |
          # Create CI-specific rhizome config (plain postgres, no SSL)
          mkdir -p ci-config
          cat > ci-config/rhizome.yaml <<'RHIZOME'
          enable-persistence: false
          session-clustering-enabled: false
          hazelcast:
            server: true
            group: "local"
            password: "trellis"
            cp-member-count: 0
            seed-nodes:
              - "localhost"
            port: 5710
          hazelcast-clients:
            IDS:
              server: false
              group: "local"
              password: "test"
              cp-member-count: 0
              seed-nodes:
                - "127.0.0.1:5710"
          postgres:
            citus: false
            hikari:
              jdbcUrl: "jdbc:postgresql://localhost:5432/chronicle"
              username: "chronicle"
              password: "testpassword"
              maximumPoolSize: 10
          datasources:
            chronicle:
              citus: false
              initialize-tables: true
              hikari:
                jdbcUrl: "jdbc:postgresql://localhost:5432/chronicle"
                username: "chronicle"
                password: "testpassword"
                maximumPoolSize: 10
          RHIZOME

          cat > ci-config/auth0.yaml <<'AUTH0'
          domain: "localhost"
          clientId: "dummy-client-id"
          clientSecret: "dummy-client-secret"
          configurations:
            - issuer: "https://localhost/"
              audience: "dummy-client-id"
              secret: "dummy-client-secret"
              base64EncodedSecret: false
              signingAlgorithm: "HS256"
          managementApiUrl: "localhost"
          AUTH0

          # Make backend scripts executable
          chmod +x chronicle-backend/bin/chronicle-server

          # Create audit log directory (Log4j needs it)
          sudo mkdir -p /var/log/chronicle
          sudo chmod 777 /var/log/chronicle

          # Start backend with CI config on classpath
          java -Xms512m -Xmx1g \
            -cp "ci-config:chronicle-backend/lib/*" \
            com.openlattice.chronicle.ChronicleServer local postgres medialocal &

          # Wait for backend (admin servlet exposes healthcheck)
          echo "Waiting for Chronicle backend on port 40320..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:40320/admin/healthcheck > /dev/null 2>&1; then
              echo "Backend ready after ~$((i*2))s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ERROR: Backend did not start within 3 minutes"
              exit 1
            fi
            sleep 2
          done

      # -- Seed test data --
      - name: Seed test study and participant
        run: |
          export SERVER_URL=http://localhost:40320
          export AUTH_TOKEN="${AUTH_TOKEN}"
          source .maestro/setup-test-data.sh

      # -- Install Maestro --
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      # -- Start emulator and run Maestro --
      - name: Run Maestro tests on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install "${APK_PATH}"
            maestro test \
              --env TEST_STUDY_ID="${TEST_STUDY_ID}" \
              --env TEST_PARTICIPANT_ID="${TEST_PARTICIPANT_ID}" \
              --format junit \
              --output maestro-results.xml \
              .maestro/flows/

      # -- Results --
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results-api${{ matrix.api-level }}
          path: |
            maestro-results.xml
            ~/.maestro/tests/**/*
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Maestro API ${{ matrix.api-level }}"
          path: maestro-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Capture failure evidence
        if: failure()
        run: |
          mkdir -p failure-screenshots
          adb exec-out screencap -p > "failure-screenshots/screen-api${{ matrix.api-level }}.png" || true
          adb logcat -d > "failure-screenshots/logcat-api${{ matrix.api-level }}.txt" || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-api${{ matrix.api-level }}
          path: failure-screenshots/
          retention-days: 14

  # ------------------------------------------------------------------
  # 4. Gate — all API levels must pass
  # ------------------------------------------------------------------
  test-gate:
    needs: maestro-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all API levels passed
        env:
          RESULT: ${{ needs.maestro-test.result }}
        run: |
          if [ "${RESULT}" != "success" ]; then
            echo "Maestro tests failed on one or more API levels"
            exit 1
          fi
          echo "All Maestro tests passed across API levels 30, 33, 34"

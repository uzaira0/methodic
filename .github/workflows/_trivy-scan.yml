name: _trivy-scan

# Reusable Trivy scan workflow. Replaces 3 inline Trivy invocations across
# ci.yml, security-scan.yml, and analysis.yml — saves ~6 minutes per PR by
# scanning each target once with consistent severity thresholds and SARIF
# upload categories.

on:
  workflow_call:
    inputs:
      scan-type:
        type: string
        required: true
        description: "Trivy scan type: 'fs', 'image', or 'config'"
      target:
        type: string
        required: true
        description: "Path or image ref to scan"
      severity:
        type: string
        default: 'CRITICAL,HIGH'
      category:
        type: string
        required: true
        description: "SARIF category, e.g. 'trivy-image-backend' or 'trivy-fs-root'"
      ignore-unfixed:
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trivy ${{ inputs.scan-type }} scan of ${{ inputs.target }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: ${{ inputs.scan-type }}
          ${{ inputs.scan-type == 'image' && 'image-ref' || 'scan-ref' }}: ${{ inputs.target }}
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          format: sarif
          output: trivy-${{ inputs.category }}.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ inputs.category }}.sarif
          category: ${{ inputs.category }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-${{ inputs.category }}
          path: trivy-${{ inputs.category }}.sarif
          retention-days: 30

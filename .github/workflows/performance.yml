name: Performance Testing

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: chronicle-web
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node compatibility runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run modern:build

      - name: Check bundle size
        run: bunx size-limit

  k6-smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Build backend
        run: ./gradlew :chronicle-server:installDist --build-cache --no-daemon

      - name: Create .env for Docker stack
        run: |
          cat > docker/.env <<'ENVEOF'
          POSTGRES_USER=chronicle
          POSTGRES_PASSWORD=test-password
          POSTGRES_DB=chronicle
          JWT_SECRET=k6-load-test-secret-key-minimum-32-characters
          HAZELCAST_SERVER_PASSWORD=ci-test-hazelcast-server
          HAZELCAST_CLIENT_PASSWORD=ci-test-hazelcast-client
          DOMAIN=localhost
          GRAFANA_ADMIN_PASSWORD=ci-test-grafana
          ENVEOF
          sed -i 's/^[[:space:]]*//' docker/.env

      - name: Generate JWT
        id: jwt
        run: |
          cd docker
          TOKEN=$(bash generate-jwt.sh 2>/dev/null)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start Docker stack
        run: |
          cd docker
          docker compose -p chronicle -f docker-compose.traefik.yml up -d chronicle-backend chronicle-postgres
          echo "Waiting for backend to be healthy..."
          timeout 120 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:40320/actuator/health 2>/dev/null | grep -q "200"; do sleep 2; done'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 smoke test
        env:
          JWT_TOKEN: ${{ steps.jwt.outputs.token }}
        run: |
          k6 run \
            --env JWT_TOKEN="$JWT_TOKEN" \
            tests/performance/smoke.js

      - name: Stop Docker stack
        if: always()
        run: cd docker && docker compose -p chronicle -f docker-compose.traefik.yml down -v

  k6-load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Build backend
        run: ./gradlew :chronicle-server:installDist --build-cache --no-daemon

      - name: Create .env for Docker stack
        run: |
          cat > docker/.env <<'ENVEOF'
          POSTGRES_USER=chronicle
          POSTGRES_PASSWORD=test-password
          POSTGRES_DB=chronicle
          JWT_SECRET=k6-load-test-secret-key-minimum-32-characters
          HAZELCAST_SERVER_PASSWORD=ci-test-hazelcast-server
          HAZELCAST_CLIENT_PASSWORD=ci-test-hazelcast-client
          DOMAIN=localhost
          GRAFANA_ADMIN_PASSWORD=ci-test-grafana
          ENVEOF
          sed -i 's/^[[:space:]]*//' docker/.env

      - name: Generate JWT
        id: jwt
        run: |
          cd docker
          TOKEN=$(bash generate-jwt.sh 2>/dev/null)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start Docker stack
        run: |
          cd docker
          docker compose -p chronicle -f docker-compose.traefik.yml up -d chronicle-backend chronicle-postgres
          echo "Waiting for backend to be healthy..."
          timeout 120 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:40320/chronicle/v3/study 2>/dev/null | grep -qE "^(200|401|403)$"; do sleep 2; done'

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 study API load test
        env:
          JWT_TOKEN: ${{ steps.jwt.outputs.token }}
        run: |
          k6 run \
            --env JWT_TOKEN="$JWT_TOKEN" \
            --summary-export tests/load/k6-summary.json \
            tests/load/k6-study-api.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6-load-test-results
          path: tests/load/k6-summary.json
          retention-days: 14

      - name: Stop Docker stack
        if: always()
        run: cd docker && docker compose -p chronicle -f docker-compose.traefik.yml down -v

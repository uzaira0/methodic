name: Chronicle platform build
on: [push]
permissions:
  contents: read
  packages: write
jobs:
  build-chronicle-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main' }}
      - name: Prepare environment
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        run: ./scripts/decrypt_signing_key.sh
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      - name: Build
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          arguments: build -x :chronicle-server:spotbugsMain -x :chronicle-server:spotbugsTest -x :chronicle-server:test
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      - name: Publish to Github Packages
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          arguments: :chronicle-api:publish :rhizome-client:publish :rhizome:publish
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      - name: Build (PR validation)
        if: github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main'
        run: ./gradlew build -x :chronicle-server:spotbugsMain -x :chronicle-server:spotbugsTest -x :chronicle-server:test --no-daemon
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: Package
          path: ./*/build/libs/
          retention-days: 5
          if-no-files-found: ignore

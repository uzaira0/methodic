name: Chronicle platform build
on: [push]
permissions:
  contents: read
  packages: write
jobs:
  build-chronicle-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main' }}
      - name: Prepare environment
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        run: ./scripts/decrypt_signing_key.sh
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      - name: Build
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: build -x :chronicle-server:spotbugsMain -x :chronicle-server:spotbugsTest -x :chronicle-server:test
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      - name: Publish to Github Packages
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: :chronicle-api:publish :rhizome-client:publish :rhizome:publish
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      - uses: actions/upload-artifact@v4
        with:
          name: Package
          path: ./*/build/libs/
          retention-days: 5

name: pr-hygiene

# Blocks contamination patterns that have shown up repeatedly in agent PRs:
#   - files matching .gitignore (dev_output.log, biome_output.txt, etc.)
#   - PRs that mix .github/workflows/ changes with non-workflow code
#   - oversized files sneaking in (binaries, build artifacts)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-gitignored-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Verify no gitignored files were added
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          added=$(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}"...HEAD)
          violations=""
          for f in $added; do
            if git check-ignore -q "$f" 2>/dev/null; then
              violations="${violations}${f}\n"
            fi
          done
          if [ -n "$violations" ]; then
            printf "ERROR: PR adds files matching .gitignore patterns:\n"
            printf "%b" "$violations"
            printf "\nThese are usually agent build artifacts (logs, dev output) that should not be committed.\n"
            exit 1
          fi

  check-mixed-concerns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Reject PRs mixing CI workflow changes with code changes
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          touches_workflows=false
          touches_code=false
          for f in $changed; do
            case "$f" in
              .github/workflows/*) touches_workflows=true ;;
              .github/dependabot.yml|.github/CODEOWNERS|.github/labeler.yml) ;;
              *) touches_code=true ;;
            esac
          done
          if [ "$touches_workflows" = "true" ] && [ "$touches_code" = "true" ]; then
            echo "ERROR: PR mixes .github/workflows/ changes with non-workflow code."
            echo "Split workflow changes into a separate PR — they need different review."
            echo ""
            echo "Files changed:"
            echo "$changed"
            exit 1
          fi

  check-file-sizes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false
      - name: Block files >1MB unless allow-listed
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          added=$(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}"...HEAD)
          oversized=""
          for f in $added; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            if [ "$size" -gt 1048576 ]; then
              case "$f" in
                gradle/verification-metadata.xml) ;;
                gradle/wrapper/gradle-wrapper.jar) ;;
                gradlew|gradlew.bat) ;;
                *)
                  oversized="${oversized}${f} (${size} bytes)\n"
                  ;;
              esac
            fi
          done
          if [ -n "$oversized" ]; then
            printf "ERROR: PR adds files >1MB outside the allow-list:\n"
            printf "%b" "$oversized"
            exit 1
          fi

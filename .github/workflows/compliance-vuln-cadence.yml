name: HIPAA Vulnerability-Scan Cadence (W5)

# W5 — Continuous vulnerability-scan cadence (HIPAA §164.308(a)(8) Evaluation;
# 2025 NPRM: vulnerability scan at least every 6 months, annual penetration test).
#
# This is the SCHEDULED evidence-producing cadence: it runs the existing scanners
# (OWASP Dependency-Check, OSV-Scanner, Grype, Semgrep) on a 6-month cron, uploads
# each scanner's SARIF to the GitHub Security tab, AND assembles a single DATED,
# HIPAA-mapped evidence bundle (manifest + report + checksums) retained for 2 years.
#
# The local/self-hosted equivalent is scripts/compliance-scan.sh (kept for offline
# runs); this workflow is the GitHub-Actions cadence now that Actions run on these
# public repos. Both produce the same shape of dated, mapped evidence.
#
# Every action is SHA-pinned (repo standard) and every job hardens the runner with
# step-security/harden-runner (egress audit). Verified with actionlint + zizmor
# (min-severity medium).

on:
  schedule:
    # 6-month cadence: 1 Jan and 1 Jul at 03:30 UTC (the NPRM floor is "at least
    # every 6 months"; this runs exactly twice a year).
    - cron: '30 3 1 1,7 *'
  workflow_dispatch:
    inputs:
      cycle:
        description: 'Evidence cycle label (vuln-scan | pentest-prep)'
        required: false
        default: 'vuln-scan'

# Least privilege at the workflow level; jobs that upload SARIF widen to
# security-events: write on themselves only.
permissions:
  contents: read

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:
  # ==========================================================================
  # OWASP Dependency-Check — Gradle dependency CVEs (CVSS >= 7 documented)
  # ==========================================================================
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Cache NVD data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .dependency-check-data
          key: nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        id: depcheck
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is required so Dependency-Check can complete reliably."
            exit 1
          fi
          ./gradlew dependencyCheckAll --no-daemon

      - name: Collect security reports
        if: always()
        run: ./gradlew aggregateSecurityReports --no-daemon || true

      - name: Upload Dependency-Check SARIF to Security tab
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always() && hashFiles('chronicle-server/build/reports/dependency-check-report.sarif') != ''
        with:
          sarif_file: chronicle-server/build/reports/dependency-check-report.sarif
          category: depcheck-cadence

      - name: Upload Dependency-Check evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: cadence-dependency-check
          path: |
            **/build/reports/dependency-check-report.*
            build/reports/security/
          retention-days: 90

  # ==========================================================================
  # OSV-Scanner — Google vulnerability database (broader than NVD alone)
  # ==========================================================================
  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif
            .

      - name: Upload OSV SARIF to Security tab
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always() && hashFiles('osv-results.sarif') != ''
        with:
          sarif_file: osv-results.sarif
          category: osv-cadence

      - name: Upload OSV evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && hashFiles('osv-results.sarif') != ''
        with:
          name: cadence-osv
          path: osv-results.sarif
          retention-days: 90

  # ==========================================================================
  # Grype — Anchore vulnerability scanner (broad CVE coverage)
  # ==========================================================================
  grype:
    name: Grype
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Run Grype
        id: grype-scan
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          path: .
          # Cadence run captures evidence; it does not gate a build (the PR-time
          # security-scan.yml is the gate). fail-build false so the bundle always assembles.
          fail-build: false
          output-format: sarif

      - name: Upload Grype SARIF to Security tab
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always() && steps.grype-scan.outputs.sarif != ''
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-cadence

      - name: Stage Grype SARIF for evidence
        if: always() && steps.grype-scan.outputs.sarif != ''
        run: cp "${{ steps.grype-scan.outputs.sarif }}" grype-results.sarif

      - name: Upload Grype evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && hashFiles('grype-results.sarif') != ''
        with:
          name: cadence-grype
          path: grype-results.sarif
          retention-days: 90

  # ==========================================================================
  # Semgrep — SAST (the curated CWE + RLS guardrail ruleset)
  # ==========================================================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (repo ruleset)
        run: |
          semgrep scan \
            --config tests/security/rules/cwe-comprehensive.yaml \
            --sarif --output semgrep-results.sarif \
            --error --metrics off || true

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-cadence

      - name: Upload Semgrep evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          name: cadence-semgrep
          path: semgrep-results.sarif
          retention-days: 90

  # ==========================================================================
  # Evidence bundle — dated, HIPAA-mapped manifest + report + checksums.
  # This is the durable compliance artifact: "the tests are the compliance evidence."
  # ==========================================================================
  evidence-bundle:
    name: Assemble HIPAA evidence bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependency-check, osv-scanner, grype, semgrep]
    if: always()
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download all scanner evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: scanner-evidence

      - name: Assemble dated, HIPAA-mapped bundle
        env:
          DEPCHECK_RESULT: ${{ needs.dependency-check.result }}
          OSV_RESULT: ${{ needs.osv-scanner.result }}
          GRYPE_RESULT: ${{ needs.grype.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          CYCLE: ${{ github.event.inputs.cycle || 'vuln-scan' }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%d)"
          NEXT="$(date -u -d '+6 months' +%Y-%m-%d 2>/dev/null || date -u +%Y-%m-%d)"
          OUT="evidence/${DATE}_${CYCLE}"
          mkdir -p "$OUT"

          # Gather every SARIF/report the scanner jobs produced.
          find scanner-evidence -type f \( -name '*.sarif' -o -name '*.json' -o -name '*.html' -o -name '*.xml' \) \
            -exec cp -f {} "$OUT/" \; 2>/dev/null || true

          # Per-artifact sha256 (tamper-evidence).
          if [ -n "$(ls -A "$OUT" 2>/dev/null)" ]; then
            ( cd "$OUT" && sha256sum -- * > SHA256SUMS 2>/dev/null ) || true
          fi

          # manifest.json — cycle metadata + per-scanner status + control refs.
          cat > "$OUT/manifest.json" <<EOF
          {
            "cycle": "${CYCLE}",
            "date_utc": "${DATE}",
            "next_due_utc": "${NEXT}",
            "cadence": "6-month (NPRM floor)",
            "run_id": "${GITHUB_RUN_ID}",
            "commit": "${GITHUB_SHA}",
            "controls": [
              "HIPAA 164.308(a)(8) Evaluation",
              "HIPAA 164.308(a)(1)(ii)(A) Risk analysis",
              "2025 NPRM: vulnerability scan at least every 6 months"
            ],
            "scanners": {
              "owasp-dependency-check": "${DEPCHECK_RESULT}",
              "osv-scanner": "${OSV_RESULT}",
              "grype": "${GRYPE_RESULT}",
              "semgrep": "${SEMGREP_RESULT}"
            }
          }
          EOF

          # compliance-report.md — HIPAA-mapped, human-readable.
          {
            echo "# Vulnerability-Scan Evidence — ${DATE} (${CYCLE})"
            echo
            echo "**Cadence:** 6-month (HIPAA 2025 NPRM floor). **Next due:** ${NEXT}."
            echo "**Run:** ${GITHUB_RUN_ID} @ ${GITHUB_SHA}"
            echo
            echo "## Controls"
            echo "- HIPAA 164.308(a)(8) Evaluation (periodic technical security evaluation)"
            echo "- HIPAA 164.308(a)(1)(ii)(A) Risk analysis"
            echo "- 2025 NPRM: vulnerability scan at least every 6 months"
            echo
            echo "## Scanners this cycle"
            echo "| Scanner | Coverage | Result |"
            echo "|---|---|---|"
            echo "| OWASP Dependency-Check | Gradle dependency CVEs (CVSS>=7) | ${DEPCHECK_RESULT} |"
            echo "| OSV-Scanner | Google vuln DB (all ecosystems) | ${OSV_RESULT} |"
            echo "| Grype | Anchore vuln DB | ${GRYPE_RESULT} |"
            echo "| Semgrep | SAST (CWE + RLS guardrails) | ${SEMGREP_RESULT} |"
            echo
            echo "## Artifacts"
            echo '```'
            ( cd "$OUT" && ls -1 ) || true
            echo '```'
            echo
            echo "SARIF for each scanner is also imported into the repository Security tab"
            echo "(categories: depcheck-cadence, osv-cadence, grype-cadence, semgrep-cadence)."
            echo
            echo "## Penetration test"
            echo "Automated scanning does NOT satisfy the annual pentest requirement; that"
            echo "engagement is tracked in docs/security/pentest-register.md."
          } > "$OUT/compliance-report.md"

          {
            echo "EVIDENCE_DIR=$OUT"
            echo "EVIDENCE_DATE=$DATE"
            echo "EVIDENCE_CYCLE=$CYCLE"
          } >> "$GITHUB_ENV"

      - name: Job summary
        run: |
          {
            echo "## HIPAA Vulnerability-Scan Cadence — $EVIDENCE_DATE ($EVIDENCE_CYCLE)"
            echo
            cat "$EVIDENCE_DIR/compliance-report.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dated HIPAA evidence bundle (2-year retention)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hipaa-vuln-evidence-${{ env.EVIDENCE_DATE }}-${{ env.EVIDENCE_CYCLE }}
          path: evidence/
          retention-days: 730

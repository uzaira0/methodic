name: jfr-snapshot

# Captures a Java Flight Recorder profile during the chronicle-server test
# suite. Weekly + dispatch. The .jfr artifact is opened in JDK Mission Control
# or VisualVM for analyzing memory allocation, GC, lock contention, etc.

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jfr:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Run chronicle-server tests with JFR capture
        run: ./gradlew :chronicle-server:test -PcaptureJfr

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: chronicle-server-jfr-${{ github.run_id }}
          path: chronicle-server/build/test.jfr
          retention-days: 90
          if-no-files-found: warn

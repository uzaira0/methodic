name: Build Android APK

# Builds a Chronicle Android APK pointed at a custom server URL.
# Download the APK artifact from the workflow run to install on a device.
on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Chronicle server base URL (e.g. http://cnrc-deni-p001.cnrc.bcm.edu/chronicle/api/mobile)"
        required: true
        type: string
      android_ref:
        description: "Git ref for chronicle-android repo"
        required: false
        default: "develop"
        type: string
      build_type:
        description: "Build type"
        required: false
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SERVER_URL: ${{ inputs.server_url }}
      BUILD_TYPE: ${{ inputs.build_type }}
    steps:
      - name: Checkout Android app
        uses: actions/checkout@v4
        with:
          repository: uzaira0/chronicle
          ref: ${{ inputs.android_ref }}
          path: app

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
          cache-dependency-path: app/**/build.gradle

      - name: Patch server URL
        working-directory: app
        run: |
          # Replace production URL with the custom server URL in all source files
          find app/src -name '*.kt' -exec grep -l 'api.getmethodic.com' {} \; | while read f; do
            sed -i "s|https://api.getmethodic.com|${SERVER_URL}|g" "$f"
            echo "Patched: $f"
          done

          # Enable cleartext HTTP if the URL is not HTTPS
          if [[ "${SERVER_URL}" == http://* ]]; then
            if ! grep -q 'usesCleartextTraffic' app/src/main/AndroidManifest.xml; then
              sed -i 's|<application|<application android:usesCleartextTraffic="true"|' \
                app/src/main/AndroidManifest.xml
              echo "Enabled cleartext HTTP traffic"
            fi
          fi

          echo "Server URL set to: ${SERVER_URL}"

      - name: Patch signing config for CI
        working-directory: app
        run: |
          cat > app/signing.properties <<'PROPS'
          keyAlias=androiddebugkey
          keyPassword=android
          storeFile=/home/runner/.android/debug.keystore
          storePassword=android
          PROPS
          sed -i '/signingConfig signingConfigs/d' app/build.gradle
          sed -i '/applicationIdSuffix/d' app/build.gradle

      - name: Create dummy google-services.json
        working-directory: app
        run: |
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json <<'GSVC'
          {
            "project_info": {"project_number": "000000000000", "project_id": "dummy", "storage_bucket": "dummy.appspot.com"},
            "client": [{"client_info": {"mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": {"package_name": "com.openlattice.chronicle"}}, "api_key": [{"current_key": "dummy"}]}],
            "configuration_version": "1"
          }
          GSVC
          fi

      - name: Build APK
        working-directory: app
        run: |
          if [ "${BUILD_TYPE}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --build-cache -x lint
          else
            ./gradlew assembleDebug --no-daemon --build-cache -x lint
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-${{ inputs.build_type }}-apk
          path: app/app/build/outputs/apk/**/*.apk
          retention-days: 30

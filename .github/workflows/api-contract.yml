name: API Contract Testing

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schemathesis:
    name: Schemathesis API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Build backend
        run: ./gradlew :chronicle-server:installDist --build-cache --no-daemon

      - name: Create .env for Docker stack
        run: |
          cat > docker/.env <<'ENVEOF'
          POSTGRES_USER=chronicle
          POSTGRES_PASSWORD=test-password
          POSTGRES_DB=chronicle
          JWT_SECRET=schemathesis-test-secret-key-minimum-32-chars
          HAZELCAST_SERVER_PASSWORD=ci-test-hazelcast-server
          HAZELCAST_CLIENT_PASSWORD=ci-test-hazelcast-client
          DOMAIN=localhost
          GRAFANA_ADMIN_PASSWORD=ci-test-grafana
          ENVEOF
          sed -i 's/^[[:space:]]*//' docker/.env

      - name: Generate JWT
        id: jwt
        run: |
          cd docker
          TOKEN=$(bash generate-jwt.sh 2>/dev/null)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Start Docker stack
        run: |
          cd docker
          docker compose -p chronicle -f docker-compose.traefik.yml up -d chronicle-backend chronicle-postgres
          echo "Waiting for backend to be healthy..."
          timeout 120 bash -c 'until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:40320/chronicle/v3/study 2>/dev/null | grep -qE "^(200|401|403)$"; do sleep 2; done'

      - name: Install Schemathesis
        run: pip install schemathesis

      - name: Run Schemathesis
        env:
          JWT_TOKEN: ${{ steps.jwt.outputs.token }}
        run: |
          schemathesis run chronicle-api/chronicle.yaml \
            --base-url http://127.0.0.1:40320 \
            --header "Authorization: Bearer $JWT_TOKEN" \
            --method GET \
            --max-examples 50 \
            --checks all \
            --junit-xml tests/api-contract/reports/schemathesis-report.xml \
            --request-timeout 10000 \
            --validate-schema false \
            --hypothesis-seed 42

      - name: Upload Schemathesis report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: schemathesis-report
          path: tests/api-contract/reports/
          retention-days: 14

      - name: Stop Docker stack
        if: always()
        run: cd docker && docker compose -p chronicle -f docker-compose.traefik.yml down -v

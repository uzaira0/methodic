name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop, main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  # ==========================================================================
  # Java/Kotlin SAST — cross-function taint tracking for chronicle-server
  # ==========================================================================
  java-analysis:
    name: CodeQL (Java/Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      # Scoped build — only compile classes needed for taint analysis
      - name: Build for CodeQL
        run: ./gradlew :chronicle-server:classes :chronicle-api:classes --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: java-kotlin
          upload: always

  # ==========================================================================
  # JavaScript/TypeScript SAST — cross-function taint tracking for chronicle-web
  # ==========================================================================
  javascript-analysis:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      # JS/TS doesn't need a build step — CodeQL extracts source directly

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: javascript-typescript
          upload: always

name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop, main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  # ==========================================================================
  # Java/Kotlin SAST — cross-function taint tracking for chronicle-server
  # ==========================================================================
  java-analysis:
    name: CodeQL (Java/Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      # Scoped build — only compile classes needed for taint analysis
      - name: Build for CodeQL
        run: ./gradlew :chronicle-server:classes :chronicle-api:classes --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          category: java-kotlin
          upload: always

  # ==========================================================================
  # JavaScript/TypeScript SAST — cross-function taint tracking for chronicle-web
  # ==========================================================================
  javascript-analysis:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      # JS/TS doesn't need a build step — CodeQL extracts source directly

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          category: javascript-typescript
          upload: always

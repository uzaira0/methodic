name: lefthook-ci

# Mirrors the local lefthook pre-commit checks (gitleaks, biome) in CI
# so that developers running with HUSKY=0 / --no-verify cannot bypass the gates.
# Runs the same `lefthook run pre-commit` command against the PR diff range.

on:
  pull_request:

permissions:
  contents: read

jobs:
  lefthook:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install lefthook
        run: |
          # Pinned + checksum-verified. Matches scripts/setup-hooks.sh (1.11.13) and
          # the GoReleaser asset name (_Linux_x86_64). -f makes a 404/MITM fail loudly
          # instead of installing the error body; the sha256 check rejects tampering.
          LEFTHOOK_VERSION=1.11.13
          LEFTHOOK_SHA256=d64379c1c0f74d10884c3487093608df973d37dcfbbc8aefa7e54564dcffb177
          curl -fsSL "https://github.com/evilmartians/lefthook/releases/download/v${LEFTHOOK_VERSION}/lefthook_${LEFTHOOK_VERSION}_Linux_x86_64" \
            -o /tmp/lefthook
          echo "${LEFTHOOK_SHA256}  /tmp/lefthook" | sha256sum -c -
          sudo install -m 0755 /tmp/lefthook /usr/local/bin/lefthook

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Install chronicle-web deps for biome
        run: cd chronicle-web && bun install --frozen-lockfile

      - name: Run lefthook pre-commit on PR diff
        env:
          LEFTHOOK_QUIET: meta,success
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t changed < <(git diff --name-only "$base...$head")
          if [ "${#changed[@]}" -gt 0 ]; then
            file_args=()
            for f in "${changed[@]}"; do
              [ -n "$f" ] && file_args+=("--file" "$f")
            done
            lefthook run pre-commit "${file_args[@]}"
          else
            echo "No files changed in PR diff."
          fi

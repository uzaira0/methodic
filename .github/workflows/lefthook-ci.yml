name: lefthook-ci

# Mirrors the local lefthook pre-commit checks (gitleaks, biome) in CI
# so that developers running with HUSKY=0 / --no-verify cannot bypass the gates.
# Runs the same `lefthook run pre-commit` command against the PR diff range.

on:
  pull_request:

permissions:
  contents: read

jobs:
  lefthook:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install lefthook
        run: |
          LEFTHOOK_VERSION=1.12.5
          curl -sSL "https://github.com/evilmartians/lefthook/releases/download/v${LEFTHOOK_VERSION}/lefthook_${LEFTHOOK_VERSION}_linux_amd64" \
            -o /tmp/lefthook
          sudo install -m 0755 /tmp/lefthook /usr/local/bin/lefthook

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Install chronicle-web deps for biome
        run: cd chronicle-web && bun install --frozen-lockfile

      - name: Run lefthook pre-commit on PR diff
        env:
          LEFTHOOK_QUIET: meta,success
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t changed < <(git diff --name-only "$base...$head")
          if [ "${#changed[@]}" -gt 0 ]; then
            file_args=()
            for f in "${changed[@]}"; do
              [ -n "$f" ] && file_args+=("--file" "$f")
            done
            lefthook run pre-commit "${file_args[@]}"
          else
            echo "No files changed in PR diff."
          fi

name: Chronicle CD

# Continuous Deployment pipeline for Chronicle healthcare research platform.
# - Push to main:     build images -> push to ghcr.io -> deploy to staging
# - Tag v*:           build images -> push to ghcr.io -> create GitHub Release
# - workflow_dispatch: manual deploy to staging or production (with approval gate)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Image tag to deploy (default: latest main build SHA)'
        required: false
        type: string

# Cancel in-progress runs for the same branch/tag (not production deploys)
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: write       # GitHub Releases
  packages: write       # ghcr.io push
  actions: read         # workflow status checks
  attestations: write   # provenance attestations

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/chronicle-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/chronicle-frontend

jobs:

  # ─────────────────────────────────────────────────────────
  # Gate: wait for CI to pass on the same commit
  # ─────────────────────────────────────────────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip CI gate for manual deploys with explicit image tag
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') }}
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: 'chronicle-web quality'
          wait-interval: 30
          allowed-conclusions: success

      - name: Wait for JVM smoke tests
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: 'jvm smoke'
          wait-interval: 30
          allowed-conclusions: success

      - name: Wait for container structure tests
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: 'container structure tests'
          wait-interval: 30
          allowed-conclusions: success

      - name: Wait for HTTP smoke tests
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: 'HTTP smoke tests'
          wait-interval: 30
          allowed-conclusions: success

  # ─────────────────────────────────────────────────────────
  # Build and push Docker images to ghcr.io
  # ─────────────────────────────────────────────────────────
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci-gate]
    # Also run if ci-gate was skipped (manual deploy with explicit tag)
    if: ${{ always() && (needs.ci-gate.result == 'success' || needs.ci-gate.result == 'skipped') }}
    outputs:
      backend_digest: ${{ steps.build-backend.outputs.digest }}
      frontend_digest: ${{ steps.build-frontend.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.primary_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Compute image metadata
        id: meta
        env:
          GH_SHA: ${{ github.sha }}
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"

          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="${GH_REF_NAME}"
            PRIMARY_TAG="${VERSION}"
          elif [[ -n "$INPUT_IMAGE_TAG" ]]; then
            PRIMARY_TAG="${INPUT_IMAGE_TAG}"
            VERSION="${PRIMARY_TAG}"
          else
            PRIMARY_TAG="sha-${SHORT_SHA}"
            VERSION="0.0.0-sha.${SHORT_SHA}"
          fi

          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Build tag list for Docker
          TAGS="${PRIMARY_TAG}"
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            TAGS="${TAGS},latest"
          elif [[ "$GH_REF" == refs/heads/main ]]; then
            TAGS="${TAGS},main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') }}
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Log in to GitHub Container Registry
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') }}
        id: build-backend
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.primary_tag }}
            ${{ env.BACKEND_IMAGE }}:${{ contains(steps.meta.outputs.tags, 'latest') && 'latest' || steps.meta.outputs.primary_tag }}
            ${{ env.BACKEND_IMAGE }}:${{ contains(steps.meta.outputs.tags, 'main') && 'main' || steps.meta.outputs.primary_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.vendor=Methodic Labs
            org.opencontainers.image.title=chronicle-backend
            org.opencontainers.image.description=Chronicle backend (Spring Boot)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build and push frontend image
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '') }}
        id: build-frontend
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: docker/Dockerfile.frontend.prod
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.primary_tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ contains(steps.meta.outputs.tags, 'latest') && 'latest' || steps.meta.outputs.primary_tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ contains(steps.meta.outputs.tags, 'main') && 'main' || steps.meta.outputs.primary_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.vendor=Methodic Labs
            org.opencontainers.image.title=chronicle-frontend
            org.opencontainers.image.description=Chronicle frontend (React + nginx)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate SBOM attestation (backend)
        if: ${{ steps.build-backend.outputs.digest != '' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
        with:
          subject-name: ${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM attestation (frontend)
        if: ${{ steps.build-frontend.outputs.digest != '' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
        with:
          subject-name: ${{ env.FRONTEND_IMAGE }}
          subject-digest: ${{ steps.build-frontend.outputs.digest }}
          push-to-registry: true

  # ─────────────────────────────────────────────────────────
  # Deploy to Staging (auto on main push, manual via dispatch)
  # ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'staging' || github.event.inputs.environment == ''))
    environment:
      name: staging
      url: https://${{ vars.STAGING_DOMAIN }}/chronicle
    env:
      DEPLOY_TAG: ${{ needs.build-images.outputs.image_tag }}
      DEPLOY_ACTOR: ${{ github.actor }}
      DEPLOY_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@2ead5e36573ea353427de4e2ccc5ebac8e2bc577 # v1.2.2
        env:
          DEPLOY_TAG: ${{ needs.build-images.outputs.image_tag }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          envs: DEPLOY_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/chronicle}"
            ./scripts/deploy.sh \
              --environment staging \
              --tag "$DEPLOY_TAG" \
              --backend-image "$BACKEND_IMAGE" \
              --frontend-image "$FRONTEND_IMAGE"

      - name: Post-deploy smoke test
        uses: appleboy/ssh-action@2ead5e36573ea353427de4e2ccc5ebac8e2bc577 # v1.2.2
        env:
          DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/chronicle}"
            ./scripts/deploy.sh --verify-only --environment staging

  # ─────────────────────────────────────────────────────────
  # Deploy to Production (manual only, requires approval)
  # ─────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-images]
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') ||
      startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN }}/chronicle
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy to production
        uses: appleboy/ssh-action@2ead5e36573ea353427de4e2ccc5ebac8e2bc577 # v1.2.2
        env:
          DEPLOY_TAG: ${{ needs.build-images.outputs.image_tag }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          envs: DEPLOY_TAG,BACKEND_IMAGE,FRONTEND_IMAGE,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/chronicle}"
            ./scripts/deploy.sh \
              --environment production \
              --tag "$DEPLOY_TAG" \
              --backend-image "$BACKEND_IMAGE" \
              --frontend-image "$FRONTEND_IMAGE"

      - name: Post-deploy smoke test
        uses: appleboy/ssh-action@2ead5e36573ea353427de4e2ccc5ebac8e2bc577 # v1.2.2
        env:
          DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/chronicle}"
            ./scripts/deploy.sh --verify-only --environment production

  # ─────────────────────────────────────────────────────────
  # GitHub Release (on tag push only)
  # ─────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-images, deploy-production]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          GH_REF_NAME: ${{ github.ref_name }}
          CD_BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          CD_FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "### Backend"
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" -- chronicle-server/ chronicle-api/ rhizome/ rhizome-client/ || true
            echo ""
            echo ""
            echo "### Frontend"
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" -- chronicle-web/ || true
            echo ""
            echo ""
            echo "### Infrastructure"
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" -- docker/ .github/ scripts/ || true
            echo ""
            echo ""
            echo "### Docker Images"
            echo "- Backend: \`${CD_BACKEND_IMAGE}:${GH_REF_NAME}\`"
            echo "- Frontend: \`${CD_FRONTEND_IMAGE}:${GH_REF_NAME}\`"
            echo ""
            echo "### Deployment"
            echo "\`\`\`bash"
            echo "./scripts/deploy.sh --tag ${GH_REF_NAME} --environment production"
            echo "\`\`\`"
          } > /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Chronicle ${{ github.ref_name }}
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true

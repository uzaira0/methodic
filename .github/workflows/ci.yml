name: Chronicle CI

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chronicle-web:
    name: chronicle-web quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chronicle-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node compatibility runtime
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Configure registry for FontAwesome
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: |
          if [ -n "$FONTAWESOME_NPM_AUTH_TOKEN" ]; then
            printf "%s\n" "@fortawesome:registry=https://npm.fontawesome.com/" >> ~/.npmrc
            printf "%s\n" "//npm.fontawesome.com/:_authToken=$FONTAWESOME_NPM_AUTH_TOKEN" >> ~/.npmrc
          fi

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Web check
        run: bun run check

      - name: Bun tests (modern)
        run: bun test --coverage src/modern

      - name: Bun tests (legacy compatibility)
        run: |
          # Run each legacy test file in its own process to avoid mock.module() leaking
          failed=0
          for f in src/bun-legacy/*.test.*; do
            echo "--- $f ---"
            bun test "$f" || failed=1
          done
          exit $failed

      - name: Legacy Jest compatibility
        run: bun run test:legacy -- --runInBand --watch=false

  jvm-smoke:
    name: jvm smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/develop' }}

      - name: Gradle project listing
        run: ./gradlew projects --no-daemon

      - name: chronicle-api tests
        run: ./gradlew :chronicle-api:test --build-cache --no-daemon

      - name: chronicle-server controller tests
        run: ./gradlew :chronicle-server:test --tests "com.openlattice.chronicle.controllers.*" --build-cache --no-daemon

      - name: Generate JaCoCo coverage report
        if: always()
        run: ./gradlew :chronicle-server:jacocoTestReport --build-cache --no-daemon

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: chronicle-server/build/reports/jacoco/test/html/
          retention-days: 14

  mutation-testing:
    name: Stryker mutation testing
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: chronicle-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node compatibility runtime
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Configure registry for FontAwesome
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: |
          if [ -n "$FONTAWESOME_NPM_AUTH_TOKEN" ]; then
            printf "%s\n" "@fortawesome:registry=https://npm.fontawesome.com/" >> ~/.npmrc
            printf "%s\n" "//npm.fontawesome.com/:_authToken=$FONTAWESOME_NPM_AUTH_TOKEN" >> ~/.npmrc
          fi

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Run Stryker mutation testing
        run: bun run test:mutate

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: chronicle-web/reports/mutation/
          retention-days: 14

  repo-automation:
    name: repo automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Compose validation
        run: docker compose --env-file docker/.env.example -f docker/docker-compose.traefik.yml config -q

      - name: Bun workflow audit
        run: bash ./scripts/check-bun-workflows.sh

      - name: Silent failure hunter
        run: bash ./scripts/silent-failure-hunter.sh

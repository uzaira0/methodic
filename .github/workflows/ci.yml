name: Chronicle CI

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chronicle-web:
    name: chronicle-web quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chronicle-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node compatibility runtime
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Configure registry for FontAwesome
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: |
          if [ -n "$FONTAWESOME_NPM_AUTH_TOKEN" ]; then
            printf "%s\n" "@fortawesome:registry=https://npm.fontawesome.com/" >> ~/.npmrc
            printf "%s\n" "//npm.fontawesome.com/:_authToken=$FONTAWESOME_NPM_AUTH_TOKEN" >> ~/.npmrc
          fi

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Web check
        run: bun run check

      - name: Jest
        run: bun run test -- --runInBand --watch=false

  jvm-smoke:
    name: jvm smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle project listing
        run: ./gradlew projects --no-daemon

      - name: chronicle-api tests
        run: ./gradlew :chronicle-api:test --no-daemon

  repo-automation:
    name: repo automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose validation
        run: docker compose --env-file docker/.env.example -f docker/docker-compose.traefik.yml config -q

      - name: Bun workflow audit
        run: bash ./scripts/check-bun-workflows.sh

      - name: Silent failure hunter
        run: bash ./scripts/silent-failure-hunter.sh

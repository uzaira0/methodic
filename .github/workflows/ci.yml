name: Chronicle CI

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chronicle-web:
    name: chronicle-web quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chronicle-web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node compatibility runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Web check
        run: bun run check

      - name: Bun tests (modern)
        run: |
          # Run each modern subdirectory separately to avoid DOM global pollution between test files
          failed=0
          for dir in src/modern/lib src/modern/state src/modern/stores src/modern/features src/modern/components src/modern/routes; do
            if [ -d "$dir" ]; then
              echo "=== $dir ==="
              bun test --coverage "$dir" || failed=1
            fi
          done
          exit $failed

      - name: Bun tests (legacy compatibility)
        run: |
          # Run each legacy test file in its own process to avoid mock.module() leaking
          failed=0
          for f in src/bun-legacy/*.test.*; do
            echo "--- $f ---"
            bun test "$f" || failed=1
          done
          exit $failed

      - name: Legacy Jest compatibility
        run: bun run test:legacy -- --runInBand --watch=false

  jvm-smoke:
    name: jvm smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/develop' }}

      - name: Gradle project listing
        run: ./gradlew projects --no-daemon

      - name: chronicle-api tests
        run: ./gradlew :chronicle-api:test --build-cache --no-daemon

      - name: chronicle-server controller tests
        run: ./gradlew :chronicle-server:test --tests "com.openlattice.chronicle.controllers.*" --build-cache --no-daemon

      - name: Generate JaCoCo coverage report
        if: always()
        run: ./gradlew :chronicle-server:jacocoTestReport --build-cache --no-daemon

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jacoco-coverage-report
          path: chronicle-server/build/reports/jacoco/test/html/
          retention-days: 14

  mutation-testing:
    name: Stryker mutation testing
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: chronicle-web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node compatibility runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Run Stryker mutation testing
        run: bun run test:mutate

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stryker-mutation-report
          path: chronicle-web/reports/mutation/
          retention-days: 14

  repo-automation:
    name: repo automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Compose validation
        run: docker compose --env-file docker/.env.example -f docker/docker-compose.traefik.yml config -q

      - name: Bun workflow audit
        run: bash ./scripts/check-bun-workflows.sh

      - name: Silent failure hunter
        run: bash ./scripts/silent-failure-hunter.sh

# Container structure tests for chronicle-web production (Dockerfile.frontend.prod)
# Run: container-structure-test test --image chronicle-frontend-prod --config tests/container/frontend-prod.yaml

schemaVersion: "2.0.0"

metadataTest:
  exposedPorts: ["8080"]
  cmd: ["nginx", "-g", "daemon off;"]
  user: "nginx"

fileExistenceTests:
  - name: "nginx binary exists"
    path: "/usr/sbin/nginx"
    shouldExist: true
    isExecutableBy: "owner"

  - name: "built frontend index.html exists"
    path: "/usr/share/nginx/html/index.html"
    shouldExist: true

  - name: "version.json exists"
    path: "/usr/share/nginx/html/version.json"
    shouldExist: true

  - name: "custom nginx config exists"
    path: "/etc/nginx/http.d/default.conf"
    shouldExist: true

  - name: "nginx pid directory exists"
    path: "/run/nginx"
    shouldExist: true

  - name: "nginx temp directory exists"
    path: "/var/lib/nginx/tmp"
    shouldExist: true

fileContentTests:
  - name: "nginx config listens on port 8080"
    path: "/etc/nginx/http.d/default.conf"
    expectedContents: ["8080"]

  - name: "version.json contains build metadata"
    path: "/usr/share/nginx/html/version.json"
    expectedContents: ["version", "buildTime"]

commandTests:
  - name: "nginx is available"
    command: "nginx"
    args: ["-v"]
    exitCode: 0

  - name: "nginx config syntax is valid"
    command: "nginx"
    args: ["-t"]
    exitCode: 0

  - name: "running as non-root user nginx"
    command: "whoami"
    expectedOutput: ["nginx"]

  - name: "no source maps in production build"
    command: "sh"
    args: ["-c", "find /usr/share/nginx/html -name '*.map' | wc -l"]
    expectedOutput: ["0"]

  - name: "pre-compressed gzip assets exist"
    command: "sh"
    args: ["-c", "find /usr/share/nginx/html -name '*.gz' | wc -l"]
    expectedOutput: ["[1-9]"]

  - name: "pre-compressed brotli assets exist"
    command: "sh"
    args: ["-c", "find /usr/share/nginx/html -name '*.br' | wc -l"]
    expectedOutput: ["[1-9]"]

  - name: "wget available for healthcheck"
    command: "which"
    args: ["wget"]
    exitCode: 0

  - name: "no package manager cache left behind"
    command: "sh"
    args: ["-c", "ls /var/cache/apk/ 2>/dev/null | wc -l"]
    expectedOutput: ["0"]

  - name: "built assets contain JS files"
    command: "sh"
    args: ["-c", "find /usr/share/nginx/html -name '*.js' | wc -l"]
    expectedOutput: ["[1-9]"]

  - name: "built assets contain CSS files"
    command: "sh"
    args: ["-c", "find /usr/share/nginx/html -name '*.css' | wc -l"]
    expectedOutput: ["[1-9]"]

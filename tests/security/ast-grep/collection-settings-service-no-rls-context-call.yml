# Catalog #12 (design §4) / §1D.2 — the settings service makes no direct RLS
# context-manager call.
#
# Design §1D.2 / refactor plan §12.1 guardrail 3: a generalized DataCollection
# settings read stays study-scoped and RLS-enforced, but RLS context must be
# published by RLSContextFilter and applied by the request-scoped datasource wrapper
# — never set directly inside a settings service. A `RLSContextManager.
# setCurrentUserContext(...)` / `.clearContext(...)` call in settings-service code
# means the service is managing RLS on its own connection, which is the regression
# this rule catches. This is the settings-scoped companion of the server-wide
# no-rls-context-manager-call.yml rule.
#
# Scoped to the settings service package; no exceptions — settings services must
# never make this call.
id: collection-settings-service-no-rls-context-call
language: Kotlin
severity: error
message: >
  Settings services must not call RLSContextManager directly (design §1D.2,
  guardrail #12). RLS context is published by RLSContextFilter and applied by the
  request-scoped datasource wrapper; a settings service managing RLS itself can set
  context on the wrong connection.
files:
  - "chronicle-server/src/main/kotlin/com/openlattice/chronicle/services/settings/*.kt"
  - "chronicle-server/src/main/kotlin/com/openlattice/chronicle/services/studies/StudySettings*.kt"
rule:
  any:
    - pattern: $MGR.setCurrentUserContext($$$ARGS)
    - pattern: RLSContextManager.setCurrentUserContext($$$ARGS)
    - pattern: RLSContextManager.clearContext($$$ARGS)

# Catalog #9 (design §4) / §1C.3-1C.4 — HardwareSensorService.startService/stopService
# only via the collection module manager (HardwareSensorsCollectionModule).
#
# Design §1C.4: direct foreground-service starts become forbidden outside the module
# manager. HardwareSensorsCollectionModule.start()/stop() is the single sanctioned
# caller; every other callsite is legacy and must be exception-listed until Phase 6
# routes it through the manager.
#
# LEGACY EXCEPTIONS (migration switch OFF — Phase 6 not flipped, these still run):
#   - PowerSaveModeReceiver.kt      : legacy power-save start/stop (retires at Phase 5B).
#   - StartOnBoot.kt                : legacy boot-time start (retires at Phase 5B/6).
#   - SensorSettingsRefreshWorker.kt: legacy settings-driven start/stop (retires Phase 6B,
#                                     gated by SensorSettingsMigration).
#   - Enrollment.kt                 : legacy enrollment-time start (retires at Phase 6).
#   - MainActivity.kt               : legacy UI-driven start (retires at Phase 6).
# Sanctioned caller (the boundary itself): after Phase 10's dependency inversion the
# :collection-sensors module talks to the HardwareSensorServiceController interface;
# HardwareSensorServiceControllerImpl.kt is the :app-side adapter that owns the real
# HardwareSensorService start/stop, so it is the sanctioned boundary and is exempt.
id: collection-hardware-service-only-via-manager
language: Kotlin
severity: error
message: >
  HardwareSensorService.startService/stopService must be called only through
  HardwareSensorsCollectionModule (design §1C.3-1C.4, guardrail #9). A new direct
  service start/stop bypasses module lifecycle ownership.
ignores:
  - "**/collection/sensors/HardwareSensorsCollectionModule.kt"
  - "**/services/sensors/HardwareSensorServiceControllerImpl.kt"
  - "**/receivers/lifecycle/PowerSaveModeReceiver.kt"
  - "**/receivers/lifecycle/StartOnBoot.kt"
  - "**/services/sensors/SensorSettingsRefreshWorker.kt"
  - "**/Enrollment.kt"
  - "**/MainActivity.kt"
  - "**/test/**"
  - "**/androidTest/**"
rule:
  any:
    - pattern: HardwareSensorService.startService($$$ARGS)
    - pattern: HardwareSensorService.stopService($$$ARGS)

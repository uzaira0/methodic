# Chronicle data collection modularization guardrails (refactor Phase 12, subphase 12A).
#
# Implements the Semgrep half of the design §4 static guardrail catalog
# (docs/DATA-COLLECTION-MODULARIZATION-DESIGN.md §4) that applies to the Android
# `collection/` package: rules #1 (privacy invariant), #9 (no sensitive default),
# #12 (no Firebase / dangerous permission). The diagnostics/settings DTO rule #8 is
# in the sibling file collection-dto.yaml because it scans a different directory
# (chronicle-models).
#
# SCOPING: this file lives OUTSIDE tests/security/rules/ on purpose — the `sast`
# layer auto-loads everything in rules/ and scans backend/web code, where the
# Firebase rule would false-positive on legacy server code. The `collection` layer
# of tests/security/run-all-security.sh invokes this file with the explicit target
# `chronicle/app/src/main/java/com/openlattice/chronicle/collection`, so the rules
# carry no directory `paths.include` block.
#
# These rules guard against NEW violations; legacy app code (services/, receivers/)
# is outside the scanned scope. Positive fixtures: tests/security/fixtures/collection/.
rules:
  # --- Catalog #1: every DataCollectionModule impl asserts the id/privacyClass invariant.
  # The abstract `val id` / `val privacyClass` overrides are compiler-enforced; what the
  # compiler does NOT enforce is the design §1A.6 invariant that a module asserts
  # `require(privacyClass == id.privacyClass)` in its `init` block. This rule flags a
  # module impl missing that guard.
  #
  # EXCEPTION: DisabledCollectionModule is excluded by `pattern-not` below. It is the
  # universal no-op wrapper — it takes `id` as a constructor arg and derives
  # `privacyClass = id.privacyClass` directly, so the invariant holds by construction
  # and it intentionally carries no `init` block.
  - id: chronicle-collection-module-must-assert-privacy-invariant
    languages: [kotlin]
    severity: ERROR
    message: >
      A DataCollectionModule implementation must assert its identity invariant in an
      `init` block: `require(privacyClass == id.privacyClass) { ... }` (design §1A.6,
      guardrail #1). The compiler enforces the `id`/`privacyClass` overrides but not
      that they agree. Add the init-block require().
    patterns:
      - pattern: |
          class $MODULE(...) : $SUP {
            ...
          }
      - metavariable-regex:
          metavariable: $SUP
          regex: "DataCollectionModule"
      - pattern-not: |
          class $MODULE(...) : $SUP {
            ...
            init {
              ...
              require(privacyClass == $ID.privacyClass) { ... }
              ...
            }
            ...
          }
      # DisabledCollectionModule derives privacyClass = id.privacyClass by construction.
      - pattern-not: |
          class $MODULE(...) : $SUP {
            ...
            final override val privacyClass = $ID.privacyClass
            ...
          }
    metadata:
      cwe: CWE-1059
      category: security
      confidence: HIGH
      references:
        - docs/DATA-COLLECTION-MODULARIZATION-DESIGN.md#1A.6

  # --- Catalog #9: resolver defaults never implicitly enable a privacy-sensitive module.
  # Design §1A.4 / decisions #15-17: PHYSICAL_TELEMETRY and LOCAL_PARTICIPANT_LABEL
  # (modules HARDWARE_SENSORS / USER_IDENTIFICATION) are never enabled implicitly. A
  # `CollectionDefaults.moduleSetting(..., enabled = true)` or `CollectionModuleSetting(
  # enabled = true, ...)` literal in default/safe-default code is a violation — only an
  # explicit server setting or user preference may flip them, never a coded default.
  - id: chronicle-collection-no-sensitive-default-enabled
    languages: [kotlin]
    severity: ERROR
    message: >
      A coded default must not enable a privacy-sensitive module. Resolver/defaults
      code must derive `enabled` from the privacy class (false for PHYSICAL_TELEMETRY
      / LOCAL_PARTICIPANT_LABEL) — only an explicit server setting / preference flips
      it (design §1A.4, decisions #15-17, guardrail #9).
    patterns:
      - pattern-either:
          - pattern: CollectionDefaults.moduleSetting($ANY, enabled = true)
          - pattern: CollectionDefaults.moduleSetting($ANY, true)
          - pattern: CollectionModuleSetting(enabled = true, ...)
    metadata:
      cwe: CWE-1188
      category: security
      confidence: MEDIUM
      references:
        - docs/DATA-COLLECTION-MODULARIZATION-DESIGN.md#1A.4

  # --- Catalog #12: collection modules add no new Firebase events.
  # Decisions #6-7 / Non-Goals: Firebase is frozen legacy app code. A collection-module
  # file must not call FirebaseAnalytics / logEvent / recordException. Legacy app code
  # (services/, receivers/) keeps its Firebase calls — the `collection` layer scans only
  # the `collection/` package, so this rule cannot reach legacy callsites.
  - id: chronicle-collection-no-new-firebase-events
    languages: [kotlin]
    severity: ERROR
    message: >
      Collection modules must not introduce Firebase analytics / Crashlytics calls.
      Firebase is frozen legacy app code (decisions #6-7, Non-Goals, guardrail #12).
      Use the local CollectionLog / module diagnostics instead.
    patterns:
      - pattern-either:
          - pattern: $ANALYTICS.logEvent($EVENT, $ARGS)
          - pattern: FirebaseAnalytics.getInstance($CTX)
          - pattern: $X.recordException($E)
    metadata:
      cwe: CWE-359
      category: security
      confidence: HIGH
      references:
        - docs/DATA-COLLECTION-MODULARIZATION-DESIGN.md#4

  # --- Catalog #12 (cont.): collection modules add no dangerous permission references.
  # Design §1A.5 / decision #16: no location, microphone, contacts, SMS, call-log or
  # camera source. No new Android permission is added by this refactor. The `collection`
  # layer scans only the `collection/` package.
  - id: chronicle-collection-no-dangerous-permission-request
    languages: [generic]
    severity: ERROR
    message: >
      Collection modules must not reference location, microphone, contacts, SMS,
      call-log or camera permissions (design §1A.5, decision #16, guardrail #12). No
      new Android permission is added by this refactor.
    patterns:
      - pattern-regex: '(ACCESS_FINE_LOCATION|ACCESS_COARSE_LOCATION|ACCESS_BACKGROUND_LOCATION|RECORD_AUDIO|READ_CONTACTS|READ_SMS|RECEIVE_SMS|READ_CALL_LOG|android\.permission\.CAMERA)'
    paths:
      include:
        - "*.kt"
    metadata:
      cwe: CWE-250
      category: security
      confidence: HIGH
      references:
        - docs/DATA-COLLECTION-MODULARIZATION-DESIGN.md#1A.5

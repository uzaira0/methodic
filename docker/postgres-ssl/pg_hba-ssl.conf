# PostgreSQL Host-Based Authentication with SSL
# Mounted at /data/db/pg_hba.conf (replaces Percona default)

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local Unix socket connections (required for pg_isready healthcheck and initdb)
local   all             all                                     peer

# Localhost connections — SSL optional (for backend connecting via 127.0.0.1)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Streaming replication connections (for --profile ha replica)
host    replication     all             172.16.0.0/12           scram-sha-256
hostssl replication     all             172.16.0.0/12           scram-sha-256

# Docker network connections — SSL required
hostssl all             all             172.16.0.0/12           scram-sha-256
hostssl all             all             10.0.0.0/8              scram-sha-256
hostssl all             all             192.168.0.0/16          scram-sha-256

# All other remote connections — SSL required
hostssl all             all             0.0.0.0/0               scram-sha-256
hostssl all             all             ::/0                    scram-sha-256

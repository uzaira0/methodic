# Falco configuration for Chronicle deployment

# Engine — use modern eBPF (no kernel module needed)
engine:
  kind: modern_ebpf

# Plugins — container metadata enrichment
plugins:
  - name: container
    library_path: libcontainer.so
    init_config:
      label_max_len: 100
      with_size: false

load_plugins:
  - container

# Output settings
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Log level
log_level: info

# Rules files
rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/chronicle-rules.yaml

# Output to stdout (Docker logging picks this up -> Loki via Promtail)
stdout_output:
  enabled: true

# File output for persistence
file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco/events.json

# Rate limiting (prevent log flooding)
outputs:
  rate: 1
  max_burst: 1000

# Buffered outputs for performance
buffered_outputs: true

# Watch for new containers
watch_config_files: true

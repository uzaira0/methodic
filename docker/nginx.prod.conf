worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=mobile_api:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=web_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Backend upstream
    upstream chronicle_backend {
        server backend:40320;
        keepalive 32;
    }

    # Frontend upstream
    upstream chronicle_frontend {
        server frontend:80;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

        # Content Security Policy
        # - 'self' for same-origin resources
        # - Auth0 domains for authentication (methodic.us.auth0.com, cdn.auth0.com)
        # - Google Analytics/Tag Manager for analytics
        # - rsms.me for Inter font
        # - 'unsafe-inline' for styles (required by React/styled-components)
        # - data: for inline images (base64)
        # - blob: for Auth0 web workers
        set $csp_default "default-src 'self'";
        set $csp_script "script-src 'self' 'sha256-u5x2jPc3qq6tXCxclhc2AsfuAh6gqS+FdKid5mVKr8U=' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.auth0.com";
        set $csp_style "style-src 'self' 'unsafe-inline' https://cdn.auth0.com https://rsms.me";
        set $csp_img "img-src 'self' data: https://cdn.auth0.com https://www.google-analytics.com";
        set $csp_font "font-src 'self' https://rsms.me https://cdn.auth0.com";
        set $csp_connect "connect-src 'self' https://methodic.us.auth0.com https://www.google-analytics.com https://www.googletagmanager.com";
        set $csp_frame "frame-src 'self' https://methodic.us.auth0.com";
        set $csp_frame_ancestors "frame-ancestors 'none'";
        set $csp_form "form-action 'self'";
        set $csp_worker "worker-src 'self' blob:";
        set $csp_base "base-uri 'self'";
        set $csp_object "object-src 'none'";
        add_header Content-Security-Policy "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_frame}; ${csp_frame_ancestors}; ${csp_form}; ${csp_worker}; ${csp_base}; ${csp_object}" always;

        # Connection limits
        limit_conn conn_limit 20;
        client_max_body_size 50M;
        server_tokens off;

        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ==============================================================
        # MOBILE API: /api/mobile/*
        # - Limited to specific endpoints (enrollment, upload, status)
        # - Requires X-Chronicle-App-Key header
        # - Strict rate limiting
        # - Only POST/GET allowed
        # ==============================================================
        location /api/mobile/ {
            # Validate app key header (set this in .env and pass to nginx)
            # Reject requests without valid app key
            if ($http_x_chronicle_app_key = "") {
                return 403 '{"error": "Missing app key"}';
            }

            # Only allow specific methods
            limit_except GET POST {
                deny all;
            }

            # Strict rate limiting for mobile
            limit_req zone=mobile_api burst=10 nodelay;

            # CORS for mobile
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'X-Chronicle-App-Key, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' '86400' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'X-Chronicle-App-Key, Content-Type, Accept';
                add_header 'Content-Length' '0';
                return 204;
            }

            # Strip /api/mobile prefix and forward to backend
            rewrite ^/api/mobile/(.*) /$1 break;
            proxy_pass http://chronicle_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Chronicle-Client-Type "mobile";
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ==============================================================
        # WEB API: /api/web/*
        # - For authenticated frontend users
        # - Requires Authorization header with JWT
        # - More endpoints available
        # - Higher rate limits
        # ==============================================================
        location /api/web/ {
            # Require Authorization header
            if ($http_authorization = "") {
                return 401 '{"error": "Authentication required"}';
            }

            # Rate limiting for web API
            limit_req zone=web_api burst=30 nodelay;

            # CORS for web frontend
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' '0';
                return 204;
            }

            # Strip /api/web prefix and forward to backend
            rewrite ^/api/web/(.*) /$1 break;
            proxy_pass http://chronicle_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Chronicle-Client-Type "web";
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ==============================================================
        # BLOCK direct backend access
        # These routes are internal only - return 404
        # ==============================================================
        location /chronicle/ {
            return 404 '{"error": "Not found"}';
        }

        location /datastore/ {
            return 404 '{"error": "Not found"}';
        }

        location /principal/ {
            return 404 '{"error": "Not found"}';
        }

        location /compliance/ {
            return 404 '{"error": "Not found"}';
        }

        location /import/ {
            return 404 '{"error": "Not found"}';
        }

        # ==============================================================
        # FRONTEND: Serve static files
        # ==============================================================
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://chronicle_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://chronicle_frontend;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Block hidden files
        location ~ /\. {
            deny all;
        }
    }
}

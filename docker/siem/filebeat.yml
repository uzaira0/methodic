# ============================================
# Chronicle Audit Log - Filebeat Configuration
# ============================================
# Ships Chronicle audit logs to self-hosted Elasticsearch or OpenSearch.
#
# Usage:
#   1. Copy this file to your Filebeat config directory
#   2. Update output section with your server credentials
#   3. Start Filebeat: filebeat -e -c filebeat.yml

filebeat.inputs:
  - type: log
    enabled: true
    paths:
      # Docker volume path - adjust for your environment
      - /var/lib/docker/volumes/chronicle_audit_logs/_data/audit*.log

    # Parse JSON directly
    json.keys_under_root: true
    json.add_error_key: true
    json.overwrite_keys: true

    # Add metadata
    fields:
      application: chronicle
      log_type: audit
      environment: production
    fields_under_root: false

    # Multiline handling (shouldn't be needed for NDJSON, but just in case)
    multiline.type: pattern
    multiline.pattern: '^\{'
    multiline.negate: true
    multiline.match: after

# ============================================
# Processors
# ============================================
processors:
  # Parse timestamp from log entry
  - timestamp:
      field: timestamp
      layouts:
        - '2006-01-02T15:04:05.000Z'
        - '2006-01-02T15:04:05Z'
      target_field: '@timestamp'

  # Add host metadata
  - add_host_metadata:
      when.not.contains.tags: forwarded

  # Drop events without required fields
  - drop_event:
      when:
        not:
          has_fields: ['action', 'timestamp']

# ============================================
# Output: Self-Hosted Options
# ============================================

# --- Self-Hosted Elasticsearch ---
output.elasticsearch:
  hosts: ["https://elasticsearch:9200"]
  username: "elastic"
  password: "${ES_PASSWORD}"
  index: "chronicle-audit-%{+yyyy.MM.dd}"
  ssl.verification_mode: "certificate"
  # ssl.certificate_authorities: ["/etc/filebeat/ca.crt"]

# --- OpenSearch (uncomment to use instead of Elasticsearch) ---
# output.elasticsearch:
#   hosts: ["https://opensearch:9200"]
#   username: "admin"
#   password: "${OPENSEARCH_PASSWORD}"
#   index: "chronicle-audit-%{+yyyy.MM.dd}"
#   ssl.verification_mode: "none"

# --- Logstash (for custom processing pipelines) ---
# output.logstash:
#   hosts: ["logstash:5044"]
#   ssl.certificate_authorities: ["/etc/filebeat/ca.crt"]

# ============================================
# Index Lifecycle Management (ILM)
# ============================================
setup.ilm.enabled: true
setup.ilm.rollover_alias: "chronicle-audit"
setup.ilm.pattern: "{now/d}-000001"
setup.ilm.policy_name: "chronicle-audit-policy"

# ============================================
# Kibana / OpenSearch Dashboards
# ============================================
setup.kibana:
  host: "https://kibana:5601"
  username: "elastic"
  password: "${ES_PASSWORD}"

# ============================================
# Logging
# ============================================
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0640

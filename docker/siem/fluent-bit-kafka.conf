# ============================================
# Chronicle Audit Log - Fluent Bit → Kafka
# ============================================
# Ships Chronicle audit logs to Apache Kafka.
#
# Usage with docker-compose.kafka.yml

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ============================================
# Input: Chronicle Audit Logs
# ============================================
[INPUT]
    Name              tail
    Tag               chronicle.audit
    Path              /var/log/chronicle/audit*.log
    Parser            json
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# ============================================
# Filters
# ============================================
[FILTER]
    Name          modify
    Match         chronicle.*
    Add           application chronicle
    Add           log_type audit

# ============================================
# Output: Apache Kafka
# ============================================
[OUTPUT]
    Name              kafka
    Match             chronicle.*
    Brokers           kafka:9092
    Topics            chronicle-audit
    Timestamp_Key     timestamp
    Retry_Limit       5
    # Batching for performance
    rdkafka.batch.num.messages      1000
    rdkafka.queue.buffering.max.ms  100

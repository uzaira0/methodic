# Promtail Configuration for Chronicle Audit Logs
# https://grafana.com/docs/loki/latest/clients/promtail/configuration/

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: chronicle-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: chronicle-audit
          app: chronicle
          __path__: /var/log/chronicle/audit*.log

    pipeline_stages:
      # Parse JSON log entries
      - json:
          expressions:
            id: id
            timestamp: timestamp
            userId: userId
            userRole: userRole
            ipAddress: ipAddress
            action: action
            resourceType: resourceType
            resourceId: resourceId
            studyId: studyId
            success: success
            accessedPHI: accessedPHI

      # Extract labels for efficient querying
      - labels:
          action:
          userRole:
          resourceType:
          success:
          accessedPHI:

      # Use log timestamp instead of ingestion time
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Add static labels
      - static_labels:
          environment: production
          compliance: hipaa

  # Scrape Docker container logs (alertmanager alerts, backend errors, etc.)
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: label
            values: ["com.docker.compose.project=chronicle"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_name']
        regex: '.*alertmanager.*'
        action: keep
    pipeline_stages:
      - static_labels:
          job: alertmanager-alerts
          environment: production

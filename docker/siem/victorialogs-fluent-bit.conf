# Chronicle local log shipping to VictoriaLogs.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    storage.path  /fluent-bit/state

[INPUT]
    Name              tail
    Tag               chronicle.audit
    Path              /var/log/chronicle/*.log
    Parser            chronicle_audit
    DB                /fluent-bit/state/chronicle-audit.db
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               traefik.access
    Path              /var/log/traefik/*.log
    DB                /fluent-bit/state/traefik-access.db
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[FILTER]
    Name          modify
    Match         chronicle.audit
    Add           application chronicle
    Add           stream chronicle-audit
    Add           job chronicle-audit

[FILTER]
    Name          modify
    Match         traefik.access
    Add           application chronicle
    Add           stream traefik-access
    Add           job traefik-access

[OUTPUT]
    Name              http
    Match             *
    Host              victoria-logs
    Port              9428
    URI               /insert/jsonline?_stream_fields=stream,job,application&_msg_field=message,log,msg,_msg&_time_field=timestamp,time,date
    Format            json_lines
    Json_date_format  iso8601
    Retry_Limit       False

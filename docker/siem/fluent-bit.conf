# ============================================
# Chronicle Audit Log - Fluent Bit Configuration
# ============================================
# Lightweight log shipper for Chronicle audit logs.
# For use with OpenSearch or self-hosted Elasticsearch.
#
# Usage:
#   fluent-bit -c fluent-bit.conf

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ============================================
# Input: Chronicle Audit Logs
# ============================================
[INPUT]
    Name              tail
    Tag               chronicle.audit
    Path              /var/log/chronicle/audit*.log
    Parser            json
    Refresh_Interval  5
    Rotate_Wait       30
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On

# ============================================
# Filters
# ============================================
[FILTER]
    Name          modify
    Match         chronicle.*
    Add           application chronicle
    Add           log_type audit

# ============================================
# Output: Self-Hosted Options
# ============================================

# --- OpenSearch (Recommended for Elasticsearch users) ---
[OUTPUT]
    Name              opensearch
    Match             chronicle.*
    Host              opensearch
    Port              9200
    Index             chronicle-audit
    Type              _doc
    HTTP_User         admin
    HTTP_Passwd       ${OPENSEARCH_PASSWORD}
    tls               On
    tls.verify        Off
    Suppress_Type_Name On

# --- Self-Hosted Elasticsearch ---
# [OUTPUT]
#     Name              es

apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: VictoriaMetrics
    orgId: 1
  - name: VictoriaLogs
    orgId: 1

datasources:

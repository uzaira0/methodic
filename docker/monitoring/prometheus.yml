global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - chronicle-alertmanager:9093

scrape_configs:
  - job_name: chronicle-backend
    metrics_path: /prometheus/
    static_configs:
      - targets:
          - chronicle-backend:40320
        labels:
          service: chronicle

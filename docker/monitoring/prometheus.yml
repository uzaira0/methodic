global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-rules.yml
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - chronicle-alertmanager:9093

scrape_configs:
  - job_name: chronicle-backend
    metrics_path: /prometheus/
    static_configs:
      - targets:
          - chronicle-backend:40320
        labels:
          service: chronicle

  # Host metrics (CPU, memory, disk, network) + textfile collector metrics
  # (encryption-health-metrics.prom, secret-rotation-metrics.prom,
  #  backup-verify-metrics.prom, restore-drill-metrics.prom)
  - job_name: node-exporter
    static_configs:
      - targets:
          - chronicle-node-exporter:9100
        labels:
          service: chronicle

  # PostgreSQL metrics (connections, replication, locks, cache hit ratio, etc.)
  - job_name: postgres-exporter
    static_configs:
      - targets:
          - chronicle-postgres-exporter:9187
        labels:
          service: chronicle

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    # Alerts are logged to Alertmanager stdout -> scraped by Promtail -> shipped to Loki.
    # Visible in Grafana audit dashboard under "alertmanager" label.
    # Alertmanager logs "Notify for alerts" with group/alert details on every firing.
    #
    # Webhook: forwards alerts to the Chronicle backend for structured logging.
    # TODO: Implement POST /internal/webhooks/alerts on chronicle-backend to receive
    #       Alertmanager webhook payloads. Until then, alerts are only in Alertmanager logs.
    webhook_configs:
      - url: 'http://chronicle-backend:40320/internal/webhooks/alerts'
        send_resolved: true
    #
    # ── Slack (uncomment and set SLACK_WEBHOOK_URL in .env) ──
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#chronicle-alerts'
    #     send_resolved: true
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'
    #
    # ── Email (set SMTP_ENABLED=true in .env) ──
    # email_configs:
    #   - to: 'admin@example.com'
    #     from: '${SMTP_FROM_EMAIL}'
    #     smarthost: '${SMTP_HOST}:${SMTP_PORT}'
    #     auth_username: '${SMTP_USERNAME}'
    #     auth_password: '${SMTP_PASSWORD}'
    #     require_tls: true
    #
    # ── PagerDuty (set PAGERDUTY_SERVICE_KEY in .env) ──
    # pagerduty_configs:
    #   - service_key: '${PAGERDUTY_SERVICE_KEY}'
    #     severity: '{{ .CommonLabels.severity }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']

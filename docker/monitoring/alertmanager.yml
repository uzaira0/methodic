global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    # Alerts logged to Alertmanager stdout (docker logs chronicle-alertmanager).
    # Loki/Promtail can scrape these for the audit dashboard.
    # TODO: Enable email/webhook when SMTP is configured.
    webhook_configs: []
    # To enable email alerts, uncomment and configure:
    # email_configs:
    #   - to: 'admin@example.com'
    #     from: '${SMTP_FROM_EMAIL}'
    #     smarthost: '${SMTP_HOST}:${SMTP_PORT}'
    #     auth_username: '${SMTP_USERNAME}'
    #     auth_password: '${SMTP_PASSWORD}'
    #     require_tls: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']

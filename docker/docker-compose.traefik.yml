name: chronicle

# Chronicle deployment behind Traefik reverse proxy
#
# API Routes:
#   - Mobile: https://${DOMAIN}/api/mobile/... (requires X-Chronicle-App-Key header)
#   - Web:    https://${DOMAIN}/api/web/...    (requires Authorization header)
#   - Frontend: https://${DOMAIN}/
#
# Direct backend routes (/chronicle/*, /datastore/*) are blocked.
#
# Usage:
#   1. Configure .env (set DOMAIN, TRAEFIK_NETWORK, MOBILE_APP_KEY, etc.)
#   2. docker-compose -f docker-compose.traefik.yml up -d

services:
  # PostgreSQL Database with Transparent Data Encryption (TDE) and SSL/TLS
  # Uses Percona Distribution for PostgreSQL with pg_tde extension for HIPAA/GDPR compliance
  # SSL/TLS encryption in transit protects data between application and database
  postgres:
    image: percona/percona-distribution-postgresql:17.5-3
    container_name: chronicle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Enable pg_tde extension for Transparent Data Encryption
      ENABLE_PG_TDE: "1"
      # TDE Key Provider Configuration
      # Options: "file" (development), "vault" (production), "none" (disabled)
      PG_TDE_KEY_PROVIDER: ${PG_TDE_KEY_PROVIDER:-file}
      # HashiCorp Vault settings (required when PG_TDE_KEY_PROVIDER=vault)
      PG_TDE_VAULT_URL: ${PG_TDE_VAULT_URL:-}
      PG_TDE_VAULT_TOKEN: ${PG_TDE_VAULT_TOKEN:-}
      PG_TDE_VAULT_MOUNT_PATH: ${PG_TDE_VAULT_MOUNT_PATH:-secret}
      PG_TDE_VAULT_CA_PATH: ${PG_TDE_VAULT_CA_PATH:-}
    volumes:
      - postgres_data:/pgdata
      # TDE keyring storage (for file-based provider - development only)
      - postgres_tde_keyring:/var/lib/postgresql/tde-keyring
      # Initialization script for TDE setup
      - ./init-db-encryption.sh:/docker-entrypoint-initdb.d/20-init-db-encryption.sh:ro
      # SSL/TLS certificates for encryption in transit
      # Generate with: ./init-postgres-ssl.sh
      - ./postgres-ssl/server/server.crt:/var/lib/postgresql/ssl/server.crt:ro,z
      - ./postgres-ssl/server/server.key:/var/lib/postgresql/ssl/server.key:ro,z
      - ./postgres-ssl/ca/ca.crt:/var/lib/postgresql/ssl/ca.crt:ro,z
    networks:
      - chronicle-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Percona image runs as postgres (UID 26) by default — no user: override needed
    # PostgreSQL SSL configuration via command line arguments
    command: >
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/ssl/server.crt
      -c ssl_key_file=/var/lib/postgresql/ssl/server.key
      -c ssl_ca_file=/var/lib/postgresql/ssl/ca.crt
      -c ssl_min_protocol_version=TLSv1.2
      -c ssl_prefer_server_ciphers=on
      -c shared_preload_libraries=pg_tde,percona_pg_telemetry
    deploy:
      resources:
        limits:
          memory: 1G

  chronicle-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: chronicle-backend:latest
    container_name: chronicle-backend
    restart: unless-stopped
    environment:
      CHRONICLE_SERVER_XMS: ${BACKEND_XMS:-"-Xms512m"}
      CHRONICLE_SERVER_XMX: ${BACKEND_XMX:-"-Xmx2g"}
      CHRONICLE_SERVER_ARGS: "local postgres medialocal"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # PostgreSQL SSL/TLS Configuration for HIPAA-compliant encryption in transit
      # Options: disable, allow, prefer, require, verify-ca, verify-full
      # Production recommendation: verify-full (validates server certificate and hostname)
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-require}
      # Path to CA certificate for server certificate verification
      POSTGRES_SSL_ROOT_CERT: /app/ssl/ca.crt
      JWT_SECRET: ${JWT_SECRET}
      # Audit log directory for HIPAA compliance
      # Logs are written in JSON format for SIEM integration
      AUDIT_LOG_DIR: /var/log/chronicle
    volumes:
      # Persistent volume for HIPAA-compliant audit logs
      # These logs are critical for compliance - rotated daily, kept 365 days
      # Format: JSON (NDJSON) compatible with Splunk, ELK, DataDog, etc.
      - audit_logs:/var/log/chronicle
      # SSL/TLS CA certificate for PostgreSQL connection verification
      - ./postgres-ssl/ca/ca.crt:/app/ssl/ca.crt:ro,z
      # Auth0 configuration (dummy for local development)
      - ./auth0.yaml:/server/config/auth0.yaml:ro,z
      # Override rhizome config with correct DB credentials (classpath precedence over JARs)
      - ./rhizome-docker.yaml:/server/config/rhizome.yaml:ro,z
    # Override command to add /server/config (auth0.yaml) to the Java classpath.
    # The Gradle-generated start script hardcodes the classpath with only lib/ JARs,
    # so we call java directly.
    command: ["sh", "-c", "exec java $$CHRONICLE_SERVER_XMS $$CHRONICLE_SERVER_XMX -cp '/server/config:/server/lib/*' com.openlattice.chronicle.ChronicleServer local postgres medialocal"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:40320/chronicle/v3/study"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 3G
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chronicle-internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.services.chronicle-backend.loadbalancer.server.port=40320"

      # ===========================================
      # MOBILE API: /chronicle/v3/*, /chronicle/v2/*, /chronicle/study/*
      # The Android app's Retrofit client uses absolute paths from the
      # shared StudyApi interface (e.g., /chronicle/v3/study/{id}/...),
      # so no strip-prefix is needed — the backend expects these paths.
      # ===========================================
      - "traefik.http.routers.chronicle-mobile.rule=Host(`${DOMAIN}`) && (PathPrefix(`/chronicle/v3/`) || PathPrefix(`/chronicle/v2/`) || PathPrefix(`/chronicle/study/`) || PathPrefix(`/chronicle/limits/`))"
      - "traefik.http.routers.chronicle-mobile.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.chronicle-mobile.priority=20"
      - "traefik.http.routers.chronicle-mobile.service=chronicle-backend"
      - "traefik.http.routers.chronicle-mobile.middlewares=chronicle-mobile-ratelimit,chronicle-mobile-headers,chronicle-mobile-cors"

      # Strict rate limiting for mobile (5 req/s average, burst of 10)
      - "traefik.http.middlewares.chronicle-mobile-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.chronicle-mobile-ratelimit.ratelimit.burst=10"

      # CORS for mobile (allow all origins)
      - "traefik.http.middlewares.chronicle-mobile-cors.headers.accessControlAllowMethods=GET,POST,OPTIONS"
      - "traefik.http.middlewares.chronicle-mobile-cors.headers.accessControlAllowHeaders=X-Chronicle-App-Key,Content-Type,Accept"
      - "traefik.http.middlewares.chronicle-mobile-cors.headers.accessControlAllowOriginList=*"
      - "traefik.http.middlewares.chronicle-mobile-cors.headers.accessControlMaxAge=86400"

      # Security headers for mobile
      - "traefik.http.middlewares.chronicle-mobile-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.chronicle-mobile-headers.headers.browserXssFilter=true"

      # ===========================================
      # WEB API: /chronicle/api/web/*
      # - For authenticated frontend users
      # - Requires Authorization header (validated by backend)
      # - Higher rate limits
      # ===========================================
      - "traefik.http.routers.chronicle-web.rule=Host(`${DOMAIN}`) && PathPrefix(`/chronicle/api/web/`)"
      - "traefik.http.routers.chronicle-web.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.chronicle-web.priority=20"
      - "traefik.http.routers.chronicle-web.service=chronicle-backend"
      - "traefik.http.routers.chronicle-web.middlewares=chronicle-web-strip,chronicle-web-ratelimit,chronicle-web-headers,chronicle-web-cors"

      # Strip /chronicle/api/web prefix
      - "traefik.http.middlewares.chronicle-web-strip.stripprefix.prefixes=/chronicle/api/web"

      # Rate limiting for web (20 req/s average, burst of 30)
      - "traefik.http.middlewares.chronicle-web-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.chronicle-web-ratelimit.ratelimit.burst=30"

      # CORS for web frontend (credentials allowed)
      - "traefik.http.middlewares.chronicle-web-cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS"
      - "traefik.http.middlewares.chronicle-web-cors.headers.accessControlAllowHeaders=Authorization,Content-Type,X-Requested-With,Accept,Origin"
      - "traefik.http.middlewares.chronicle-web-cors.headers.accessControlAllowOriginListRegex=.*"
      - "traefik.http.middlewares.chronicle-web-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.chronicle-web-cors.headers.accessControlMaxAge=86400"

      # Security headers for web
      - "traefik.http.middlewares.chronicle-web-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.chronicle-web-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.chronicle-web-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.chronicle-web-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.chronicle-web-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.chronicle-web-headers.headers.stsIncludeSubdomains=true"

      # ===========================================
      # BLOCK direct backend access
      # Returns 404 for /chronicle/datastore/*, /chronicle/principal/*, etc.
      # ===========================================
      - "traefik.http.routers.chronicle-block.rule=Host(`${DOMAIN}`) && (PathPrefix(`/chronicle/datastore/`) || PathPrefix(`/chronicle/principal/`) || PathPrefix(`/chronicle/compliance/`) || PathPrefix(`/chronicle/import/`))"
      - "traefik.http.routers.chronicle-block.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.chronicle-block.priority=15"
      - "traefik.http.routers.chronicle-block.service=chronicle-backend"
      - "traefik.http.routers.chronicle-block.middlewares=chronicle-block-response"

      # Return empty response (Traefik doesn't have a built-in 404 middleware, so we use replacepathregex to a non-existent path)
      - "traefik.http.middlewares.chronicle-block-response.replacepathregex.regex=.*"
      - "traefik.http.middlewares.chronicle-block-response.replacepathregex.replacement=/blocked-route-not-found"

  chronicle-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.prod
    image: chronicle-frontend:latest
    container_name: chronicle-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - chronicle-internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      # Frontend: /chronicle/* (lower priority than /chronicle/api/*)
      - "traefik.http.routers.chronicle-frontend.rule=Host(`${DOMAIN}`) && PathPrefix(`/chronicle`)"
      - "traefik.http.routers.chronicle-frontend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.chronicle-frontend.priority=1"
      - "traefik.http.services.chronicle-frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.chronicle-frontend.middlewares=chronicle-frontend-strip,chronicle-frontend-headers"

      # Strip /chronicle prefix so nginx serves from /
      - "traefik.http.middlewares.chronicle-frontend-strip.stripprefix.prefixes=/chronicle"

      # Security headers for frontend
      - "traefik.http.middlewares.chronicle-frontend-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.chronicle-frontend-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.chronicle-frontend-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.chronicle-frontend-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.chronicle-frontend-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.chronicle-frontend-headers.headers.stsIncludeSubdomains=true"

networks:
  chronicle-internal:
    driver: bridge
    internal: true
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}

volumes:
  postgres_data:
  # Separate volume for TDE keyring to ensure key persistence
  # IMPORTANT: Back up this volume securely - loss of keys means loss of encrypted data
  postgres_tde_keyring:
  # HIPAA-compliant audit logs volume
  # Contains JSON-formatted audit entries for compliance and SIEM integration
  # Retention: 365 days (configure cleanup policy for production)
  # IMPORTANT: Include in backup strategy for compliance requirements
  audit_logs:

# Chronicle Security Infrastructure Overlay
#
# Deploy with:
#   docker compose -f docker-compose.traefik.yml -f docker-compose.security.yml -p chronicle up -d
#
# Components:
#   1. CrowdSec — IPS + WAF (AppSec) with Traefik bouncer plugin
#   2. HashiCorp Vault — secrets management
#   3. Fail2ban — IP banning for rate-limit abuse and brute force
#   4. Falco — container runtime security monitoring
#
# Post-deployment:
#   - Generate bouncer API key: docker exec chronicle-crowdsec cscli bouncers add traefik-bouncer
#   - Add the key to CROWDSEC_BOUNCER_API_KEY in .env
#   - Restart Traefik to pick up the key
#   - Initialize Vault: docker exec chronicle-vault sh /vault/scripts/init-vault.sh
#   - Check CrowdSec: docker exec chronicle-crowdsec cscli metrics
#   - Check Falco alerts: docker logs chronicle-falco
#   - Check Fail2ban status: docker exec chronicle-fail2ban fail2ban-client status

services:

  # =========================================
  # CrowdSec — IPS + WAF (AppSec)
  # =========================================
  # Behavior-based intrusion prevention system with OWASP AppSec rules.
  # Analyzes Traefik access logs + inspects HTTP requests via AppSec.
  # Shares threat intelligence across the CrowdSec network.
  #
  # The Traefik bouncer plugin (configured in traefik.yml) queries CrowdSec
  # to decide whether to allow or block each request.
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.6
    container_name: chronicle-crowdsec
    restart: unless-stopped
    environment:
      # Install collections on first start
      COLLECTIONS: >-
        crowdsecurity/traefik
        crowdsecurity/http-cve
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
      # Enroll with CrowdSec console (optional — for threat intelligence sharing)
      # ENROLL_KEY: ${CROWDSEC_ENROLL_KEY:-}
    volumes:
      - ./security/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro,z
      - ./security/crowdsec/acquis.d:/etc/crowdsec/acquis.d:ro,z
      - crowdsec_db:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      # Read Traefik access logs for behavior analysis
      - traefik_access_logs:/var/log/traefik:ro
    networks:
      - chronicle-internal
      - traefik
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # CrowdSec bouncer plugin is configured in traefik/traefik.yml
  # (experimental.plugins section). The middleware is defined in
  # traefik/dynamic/crowdsec-waf.yml (file provider).

  # CrowdSec WAF middleware is defined via Traefik file provider
  # (see traefik/dynamic/crowdsec-waf.yml) and applied to backend routes
  # by overriding the middleware chain on the mobile and web routers.

  # =========================================
  # HashiCorp Vault — Secrets Management
  # =========================================
  vault:
    image: hashicorp/vault:1.15
    container_name: chronicle-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - ./security/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro,z
      - ./security/vault/init-vault.sh:/vault/scripts/init-vault.sh:ro,z
    command: vault server -config=/vault/config/vault-config.hcl
    networks:
      - chronicle-internal
    healthcheck:
      test: ["CMD", "vault", "status", "-format=json"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # =========================================
  # Fail2ban — Abuse Protection
  # =========================================
  fail2ban:
    image: crazymax/fail2ban:1.1.0
    container_name: chronicle-fail2ban
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: UTC
      F2B_LOG_TARGET: STDOUT
      F2B_LOG_LEVEL: INFO
      F2B_DB_PURGE_AGE: 7d
    volumes:
      - ./security/fail2ban/jail.local:/etc/fail2ban/jail.local:ro,z
      - ./security/fail2ban/filter.d:/etc/fail2ban/filter.d:ro,z
      - fail2ban_data:/var/lib/fail2ban
      - traefik_access_logs:/var/log/traefik:ro
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 128M

  # =========================================
  # Falco — Container Runtime Security
  # =========================================
  falco:
    image: falcosecurity/falco:0.43.0
    container_name: chronicle-falco
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev
      - /sys:/host/sys:ro
      - ./security/falco/falco.yaml:/etc/falco/falco.yaml:ro,z
      - ./security/falco/chronicle-rules.yaml:/etc/falco/chronicle-rules.yaml:ro,z
      - falco_logs:/var/log/falco
    healthcheck:
      test: ["CMD-SHELL", "falco --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - chronicle-internal
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  crowdsec_db:
  crowdsec_config:
  vault_data:
  vault_logs:
  fail2ban_data:
  falco_logs:

networks:
  chronicle-internal:
  traefik:
    external: true
    name: traefik-apps

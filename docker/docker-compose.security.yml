# Chronicle Security Infrastructure Overlay
#
# Deploy with:
#   docker compose -f docker-compose.traefik.yml -f docker-compose.security.yml -p chronicle up -d
#
# Components:
#   1. Coraza WAF — Traefik plugin middleware (no separate container)
#   2. HashiCorp Vault — secrets management (replaces .env for sensitive values)
#   3. Fail2ban — IP banning for rate-limit abuse and brute force
#   4. Falco — container runtime security monitoring
#
# WAF is configured in traefik/dynamic/chronicle-waf.yml as a Traefik middleware.
# Apply it to backend routes by adding 'chronicle-waf@file' to router middlewares.
#
# Post-deployment:
#   - Initialize Vault: docker exec chronicle-vault sh /vault/scripts/init-vault.sh
#   - Check Falco alerts: docker logs chronicle-falco
#   - Check Fail2ban status: docker exec chronicle-fail2ban fail2ban-client status

services:

  # WAF middleware is not currently available as a stable Traefik plugin.
  # The backend's Spring Security, RateLimitFilter, and input validation
  # provide application-layer security. WAF can be added when a production-ready
  # Traefik plugin becomes available (Coraza WASM plugin has stack overflow bugs).

  # =========================================
  # HashiCorp Vault — Secrets Management
  # =========================================
  vault:
    image: hashicorp/vault:1.15
    container_name: chronicle-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - ./security/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro,z
      - ./security/vault/init-vault.sh:/vault/scripts/init-vault.sh:ro,z
    command: vault server -config=/vault/config/vault-config.hcl
    networks:
      - chronicle-internal
    healthcheck:
      test: ["CMD", "vault", "status", "-format=json"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # =========================================
  # Fail2ban — Abuse Protection
  # =========================================
  # Monitors Traefik access logs and bans abusive IPs:
  #   - 20+ rate-limited (429) responses → 1h ban
  #   - 10+ auth failures (401) → 2h ban
  #   - 30+ 404s (scanning) → 4h ban
  fail2ban:
    image: crazymax/fail2ban:1.1.0
    container_name: chronicle-fail2ban
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TZ: UTC
      F2B_LOG_TARGET: STDOUT
      F2B_LOG_LEVEL: INFO
      F2B_DB_PURGE_AGE: 7d
    volumes:
      - ./security/fail2ban/jail.local:/etc/fail2ban/jail.local:ro,z
      - ./security/fail2ban/filter.d:/etc/fail2ban/filter.d:ro,z
      - fail2ban_data:/var/lib/fail2ban
      # Mount Traefik access logs (written by chronicle-traefik)
      - traefik_access_logs:/var/log/traefik:ro
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 128M

  # =========================================
  # Falco — Container Runtime Security
  # =========================================
  falco:
    image: falcosecurity/falco:0.43.0
    container_name: chronicle-falco
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /dev:/host/dev
      - /sys:/host/sys:ro
      - ./security/falco/falco.yaml:/etc/falco/falco.yaml:ro,z
      - ./security/falco/chronicle-rules.yaml:/etc/falco/chronicle-rules.yaml:ro,z
      - falco_logs:/var/log/falco
    networks:
      - chronicle-internal
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  vault_data:
  vault_logs:
  fail2ban_data:
  falco_logs:

networks:
  chronicle-internal:
  traefik:
    external: true
    name: traefik-apps

server {
    listen 8080;
    server_name _;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; sandbox" always;
    add_header X-Frame-Options "DENY" always;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    location = /chronicle/downloads/Chronicle-2026-06-10-beta.1.apk {
        alias /srv/downloads/Chronicle-2026-06-10-beta.1.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="Chronicle-2026-06-10-beta.1.apk"' always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /chronicle/downloads/Chronicle-2026-06-10-beta.1.apk.sha256 {
        alias /srv/downloads/Chronicle-2026-06-10-beta.1.apk.sha256;
        default_type text/plain;
        add_header Content-Disposition 'inline; filename="Chronicle-2026-06-10-beta.1.apk.sha256"' always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        return 404;
    }
}

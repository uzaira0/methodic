##
# Jetty configuration for Docker deployment
# Overrides the JAR-bundled jetty.yaml via classpath priority (/server/config first)
##

max-threads: 500

web-endpoint:
  http-port: 40320
  https-port: 8443
  http2-enabled: false
  use-ssl: false
  require-ssl: false
  require-client-auth: false
  want-client-auth: false

gzip:
  enabled: true

          - url: "http://ess-scoring-upload-server:8000"
    chronicle-fe-svc:
      loadBalancer:
        servers:
          - url: "http://chronicle-frontend:8080"
    chronicle-preprocessing-gui-svc:
      loadBalancer:
        servers:
          - url: "http://chronicle-preprocessing-frontend:8080"
    chronicle-backend-svc:

global:
  sendAnonymousUsage: false

providers:
  docker:
    exposedByDefault: false
    watch: true
    network: traefik-apps
  file:
    directory: /etc/traefik/dynamic
    watch: true

entryPoints:
  web:
    address: :80
  websecure:
    address: :443
    http3:
      advertisedPort: 443

api:
  dashboard: false

ping: {}

# Access logging for CrowdSec + Fail2ban
accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

# CrowdSec bouncer plugin for WAF + IP reputation
experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.5.1

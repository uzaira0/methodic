version: '3.8'

# Chronicle + Grafana Loki Stack
#
# Self-hosted log aggregation with Grafana dashboards.
# Usage:
#   docker-compose -f docker-compose.prod.yml -f docker-compose.loki.yml up -d
#
# Access Grafana at http://localhost:3000 (admin/admin)

services:
  # Loki - Log aggregation
  loki:
    image: grafana/loki:2.9.0
    container_name: chronicle-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./siem/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - chronicle-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Promtail - Log shipper
  promtail:
    image: grafana/promtail:2.9.0
    container_name: chronicle-promtail
    restart: unless-stopped
    volumes:
      - ./siem/promtail-config.yml:/etc/promtail/config.yml:ro
      - audit_logs:/var/log/chronicle:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - chronicle-internal
    depends_on:
      - loki

  # Grafana - Visualization & Alerting
  grafana:
    image: grafana/grafana:10.2.0
    container_name: chronicle-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./siem/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./siem/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./siem/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - chronicle-internal
    depends_on:
      - loki

networks:
  chronicle-internal:
    external: true

volumes:
  loki_data:
  grafana_data:
  audit_logs:
    external: true
    name: chronicle_audit_logs

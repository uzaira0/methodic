server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (applied to all responses)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content Security Policy
    # - 'self' for same-origin resources
    # - Auth0 domains for authentication (methodic.us.auth0.com, cdn.auth0.com)
    # - Google Analytics/Tag Manager for analytics
    # - rsms.me for Inter font
    # - 'unsafe-inline' for styles (required by React/styled-components)
    # - data: for inline images (base64)
    # - blob: for Auth0 web workers
    set $csp_default "default-src 'self'";
    set $csp_script "script-src 'self' 'sha256-u5x2jPc3qq6tXCxclhc2AsfuAh6gqS+FdKid5mVKr8U=' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.auth0.com";
    set $csp_style "style-src 'self' 'unsafe-inline' https://cdn.auth0.com https://rsms.me";
    set $csp_img "img-src 'self' data: https://cdn.auth0.com https://www.google-analytics.com https://www.googletagmanager.com";
    set $csp_font "font-src 'self' https://rsms.me https://cdn.auth0.com";
    set $csp_connect "connect-src 'self' https://methodic.us.auth0.com https://www.google-analytics.com https://www.googletagmanager.com";
    set $csp_frame "frame-src 'self' https://methodic.us.auth0.com";
    set $csp_frame_ancestors "frame-ancestors 'none'";
    set $csp_form "form-action 'self'";
    set $csp_worker "worker-src 'self' blob:";
    set $csp_base "base-uri 'self'";
    set $csp_object "object-src 'none'";
    add_header Content-Security-Policy "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_frame}; ${csp_frame_ancestors}; ${csp_form}; ${csp_worker}; ${csp_base}; ${csp_object}" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Serve static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Security headers must be repeated in location blocks (nginx behavior)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    # Serve config.json with no-cache headers (contains JWT token)
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Security headers must be repeated in location blocks (nginx behavior)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_frame}; ${csp_frame_ancestors}; ${csp_form}; ${csp_worker}; ${csp_base}; ${csp_object}" always;
    }
}

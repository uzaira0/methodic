server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Brotli static (pre-compressed .br files, ~15-20% smaller than gzip)
    brotli_static on;

    # Gzip static (pre-compressed .gz files, no CPU overhead)
    gzip_static on;

    # Dynamic gzip fallback for non-precompressed responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/vnd.ms-fontobject
        font/opentype
        image/svg+xml;

    # Security headers (applied to all responses)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content Security Policy
    # - 'self' for same-origin resources
    # - Google Analytics/Tag Manager for analytics
    # - Inter font self-hosted via @fontsource-variable/inter
    # - style hashes for inline style blocks are constrained in script/template rendering
    # - data: for inline images (base64)
    set $csp_default "default-src 'self'";
    set $csp_script "script-src 'self' 'sha256-u5x2jPc3qq6tXCxclhc2AsfuAh6gqS+FdKid5mVKr8U=' https://www.googletagmanager.com https://www.google-analytics.com";
    set $csp_style "style-src 'self' 'unsafe-inline'";
    set $csp_img "img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com";
    set $csp_font "font-src 'self' data:";
    set $csp_connect "connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com";
    set $csp_frame "frame-src 'self'";
    set $csp_frame_ancestors "frame-ancestors 'none'";
    set $csp_form "form-action 'self'";
    set $csp_worker "worker-src 'self'";
    set $csp_base "base-uri 'self'";
    set $csp_object "object-src 'none'";
    add_header Content-Security-Policy "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_frame}; ${csp_frame_ancestors}; ${csp_form}; ${csp_worker}; ${csp_base}; ${csp_object}" always;

    # Health check endpoint (no security headers needed — internal only, plain text)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Serve static files with caching
    # Note: add_header in a location block replaces (not merges) server-level headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        try_files $uri =404;
    }

    # Version endpoint for deploy-detection polling (no caching)
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /chronicle/version.json {
        alias /usr/share/nginx/html/version.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ~* ^/chronicle/(.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
        alias /usr/share/nginx/html/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    }

    location /chronicle/ {
        try_files $uri $uri/ /index.html;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_frame}; ${csp_frame_ancestors}; ${csp_form}; ${csp_worker}; ${csp_base}; ${csp_object}" always;
    }
}

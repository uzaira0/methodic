# osv-scanner config — DIRECTORY-SCOPED to gradle/verification-metadata.xml
#
# Why this file exists and why it only lives in gradle/:
# OSV-Scanner's `--recursive .` (see .github/workflows/analysis.yml :: osv-scanner job)
# parses gradle/verification-metadata.xml as if it were a resolved dependency manifest.
# It is NOT. verification-metadata.xml is Gradle's *artifact-hash catalog* — it pins
# checksums for EVERY artifact Gradle has ever resolved across ALL configurations
# (compile, test, build-classpath, plugin-classpath, multiple coordinate versions of
# the same library). It is an integrity-verification ledger, not the runtime graph.
#
# The authoritative resolved runtime dependency set is the per-module gradle.lockfile
# (chronicle-server/, chronicle-api/, rhizome/, rhizome-client/, chronicle-models/).
# Every high-severity CVE that OSV flagged against verification-metadata.xml was
# verified to be a STALE CATALOG ENTRY whose resolved lockfile version is already
# patched, e.g.:
#   - org.slf4j:slf4j-ext 1.7.12 (CVSS 9.8, GHSA-w77p-8cfg-2x43) — NOT in any lockfile
#   - spring-security-web 6.5.8 (CVSS 9.1, GHSA-mf92-479x-3373)  — resolved is 6.5.10
#   - bcprov/bcpg-jdk18on 1.71 (CVSS 8.7, GHSA-cj8j-37rh-8475)   — resolved is 1.84
#   - org.yaml:snakeyaml 1.18/1.27                               — resolved is 2.5
#   - io.netty:netty-handler 4.1.128/4.1.133                     — resolved is 4.2.13.Final
#   - org.eclipse.jetty:jetty-http 12.0.32                       — resolved is 12.0.35
#   - org.postgresql:postgresql 42.7.10                          — resolved is 42.7.11
#
# This config is placed in gradle/ (NOT repo root) so OSV-Scanner auto-loads it ONLY
# for manifests in this directory (i.e. verification-metadata.xml). Identical CVE IDs
# that ALSO appear in a real gradle.lockfile remain UNSUPPRESSED and continue to be
# reported (verified: GHSA-j288 in commons-lang3 still surfaces from the lockfiles).
# Those lockfile findings are tracked as dependency bumps owned by the dependency stream.

